<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Gestão de Pessoal · NeuroDynamics</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%231D1D1F'/%3E%3Ccircle cx='11' cy='16' r='5' fill='%23F5F5F7'/%3E%3Ccircle cx='23' cy='9.5' r='2.8' fill='%23F5F5F7'/%3E%3Ccircle cx='23' cy='22.5' r='2.8' fill='%23F5F5F7'/%3E%3Cpath d='M15 13.8 20.6 10.6M15 18.2 20.6 21.4' stroke='%23CEDC00' stroke-width='1.7' stroke-linecap='round'/%3E%3C/svg%3E">
<style>
:root{
  --bg:#F5F5F7; --panel:#FFFFFF; --ink:#1D1D1F; --muted:#6E6E73; --soft:#F0F0F2;
  --line:#E8E8ED; --line2:#D2D2D7; --green:#00594F; --deep:#00352F; --syn:#CEDC00;
  --ok:#1F8A5B; --bad:#C0392B; --warn:#B7791F; --info:#4C6FBF; --gray:#8E8E93;
  --r:12px; --sh:0 1px 2px rgba(0,0,0,.05);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,Helvetica,sans-serif;
  font-size:14px;color:var(--ink);background:var(--bg);-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;color:inherit}
input,select,textarea{font-family:inherit;font-size:14px;color:var(--ink)}
a{color:var(--green);text-decoration:none}
a:hover{text-decoration:underline}
[hidden]{display:none!important}
.ic{width:19px;height:19px;flex-shrink:0}
.logo-mark{display:block}

/* ============ LOGIN ============ */
#login-view{position:fixed;inset:0;display:flex;background:#0C0C0D;color:#F5F5F7;z-index:10;
  background-image:linear-gradient(rgba(245,245,247,.045) 1px,transparent 1px),linear-gradient(90deg,rgba(245,245,247,.045) 1px,transparent 1px);
  background-size:120px 120px}
.lg-left{flex:1;position:relative;min-width:0}
.lg-logo{position:absolute;top:30px;left:34px;display:flex;align-items:center;gap:11px;color:#F5F5F7}
.lg-logo .logo-mark{height:26px;width:auto;filter:brightness(0) invert(1)}
.lg-rodape{position:absolute;bottom:22px;left:34px;right:34px;font-size:11.5px;color:#98989D;letter-spacing:.02em}
.lg-panel{width:min(430px,100%);background:#1D1D1F;padding:60px 48px;display:flex;flex-direction:column;justify-content:center}
.lg-panel h1{font-size:38px;font-weight:600;letter-spacing:-.5px;margin-bottom:42px;color:#F5F5F7}
.lg-field{margin-bottom:26px}
.lg-field label{display:block;font-size:10.5px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:#98989D;margin-bottom:7px}
.lg-field input{width:100%;background:transparent;border:none;border-bottom:1px solid #77777C;color:#F5F5F7;
  padding:7px 2px;font-size:15px;border-radius:0}
.lg-field input:focus{outline:none;border-bottom-color:var(--syn)}
.lg-go{align-self:flex-end;margin-top:34px;width:38px;height:38px;border-radius:11px;border:none;background:#F5F5F7;
  color:#1D1D1F;display:flex;align-items:center;justify-content:center;transition:transform .15s}
.lg-go:hover{transform:scale(1.05)}
.lg-go:disabled{opacity:.5;transform:none;cursor:default}
.lg-go .ic{width:19px;height:19px}
.lg-err{background:rgba(192,57,43,.16);border:1px solid rgba(192,57,43,.4);color:#F1A9A0;
  border-radius:10px;padding:10px 13px;font-size:12.5px;margin-bottom:20px;line-height:1.5}
.lg-warn{background:rgba(183,121,31,.14);border:1px solid rgba(183,121,31,.4);color:#E5C07B;
  border-radius:10px;padding:10px 13px;font-size:12.5px;margin-bottom:20px;line-height:1.5}
@media (max-width:760px){ .lg-left{display:none} .lg-panel{width:100%} 
  #login-view{background-image:none}
  .lg-panel::before{content:'';position:fixed;top:30px;left:34px} }

/* ============ ESTRUTURA ============ */
#app{display:flex;min-height:100vh}
.sidebar{width:230px;flex-shrink:0;background:var(--panel);border-right:1px solid var(--line);
  display:flex;flex-direction:column;position:sticky;top:0;height:100vh;transition:width .18s ease;overflow:hidden}
#app.rail .sidebar{width:66px}
.sb-top{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:16px 14px 12px}
#app.rail .sb-top{justify-content:center}
.sb-brand{display:flex;align-items:center;min-width:0}
.sb-brand .logo-mark{height:22px;width:auto;max-width:150px}
#app.rail .sb-brand{display:none}
.sb-nav{flex:1;padding:6px;overflow-y:auto;overflow-x:hidden}
.sb-nav button{display:flex;align-items:center;gap:11px;width:100%;background:none;border:none;text-align:left;
  padding:10px 12px;font-size:13.5px;font-weight:500;color:#48484A;border-radius:10px;margin-bottom:2px;white-space:nowrap}
.sb-nav button .ic{color:#7C7C80}
.sb-nav button:hover{background:var(--soft)}
.sb-nav button.active{background:var(--soft);color:var(--green);font-weight:600}
.sb-nav button.active .ic{color:var(--green)}
#app.rail .sb-nav button{justify-content:center;padding:11px 0}
#app.rail .sb-nav button .lb{display:none}
.sb-user{padding:12px;border-top:1px solid var(--line);display:flex;align-items:center;gap:10px}
.sb-user .avatar{width:32px;height:32px;flex-shrink:0}
.sb-user .info{min-width:0;flex:1}
.sb-user .nm{font-size:12.5px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-user .rl{font-size:11px;color:var(--muted);white-space:nowrap}
#app.rail .sb-user .info,#app.rail .sb-user .icon-btn{display:none}
main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:5;background:rgba(245,245,247,.82);backdrop-filter:blur(14px) saturate(1.6);
  -webkit-backdrop-filter:blur(14px) saturate(1.6);border-bottom:1px solid var(--line);
  padding:12px 26px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.topbar .tleft{display:flex;align-items:center;gap:12px;min-width:0}
.topbar h1{font-size:17px;font-weight:600;letter-spacing:-.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar .tacts{display:flex;align-items:center;gap:8px}
.content{padding:24px 26px 70px;max-width:1220px;width:100%}

/* ============ COMPONENTES ============ */
.icon-btn{width:38px;height:38px;border-radius:11px;border:1px solid var(--line);background:var(--panel);
  display:inline-flex;align-items:center;justify-content:center;color:#48484A;flex-shrink:0;box-shadow:var(--sh)}
.icon-btn:hover{border-color:var(--line2);background:#FAFAFA}
.icon-btn.primary{background:var(--deep);border-color:var(--deep);color:#fff}
.icon-btn.primary:hover{background:var(--green);border-color:var(--green)}
.icon-btn.danger{color:var(--bad)}
.icon-btn.ghost{border-color:transparent;background:transparent;box-shadow:none}
.icon-btn.ghost:hover{background:var(--soft)}
.icon-btn.sm{width:32px;height:32px;border-radius:9px}
.icon-btn.sm .ic{width:16px;height:16px}
.btn{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--line);background:var(--panel);
  border-radius:10px;padding:8px 15px;font-size:13.5px;font-weight:600;color:var(--ink);box-shadow:var(--sh)}
.btn:hover{border-color:var(--line2);background:#FAFAFA}
.btn-primary{background:var(--deep);border-color:var(--deep);color:#fff}
.btn-primary:hover{background:var(--green);border-color:var(--green)}
.btn-danger{color:var(--bad)}
.btn:disabled{opacity:.5;cursor:default}
.btn .ic{width:16px;height:16px}
.avatar{border-radius:50%;background:var(--soft);color:var(--green);display:inline-flex;align-items:center;
  justify-content:center;font-weight:700;font-size:12px;letter-spacing:.02em}
.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:20px;margin-bottom:16px;box-shadow:var(--sh)}
.card h3{font-size:14.5px;font-weight:600;letter-spacing:-.1px;margin-bottom:14px}
.grid-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(165px,1fr));gap:13px;margin-bottom:16px}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px 18px;box-shadow:var(--sh)}
.stat .n{font-size:27px;font-weight:700;letter-spacing:-.6px}
.stat .l{font-size:12px;color:var(--muted);margin-top:2px}
.stat.alert{border-color:#EBC8C3}
.stat.alert .n{color:var(--bad)}
.pill{display:inline-flex;align-items:center;gap:6px;background:var(--soft);border-radius:999px;
  padding:3.5px 11px;font-size:11.5px;font-weight:600;color:#3A3A3C;white-space:nowrap}
.pill .dt{width:7px;height:7px;border-radius:50%;background:var(--gray);flex-shrink:0}
.dt-ok{background:var(--ok)!important}.dt-warn{background:var(--warn)!important}
.dt-info{background:var(--info)!important}.dt-bad{background:var(--bad)!important}.dt-gray{background:var(--gray)!important}
.chip{display:inline-block;background:var(--soft);border-radius:7px;padding:2.5px 8px;font-size:11px;
  color:#48484A;margin:1px 3px 1px 0;font-weight:500}
.reg{font-variant-numeric:tabular-nums;font-weight:600;color:var(--muted);font-size:12.5px}
table.tb{width:100%;border-collapse:collapse}
.tb th{text-align:left;font-size:10.5px;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);
  padding:8px 10px;border-bottom:1px solid var(--line);font-weight:600}
.tb td{padding:10.5px 10px;border-bottom:1px solid #F1F1F4;vertical-align:middle}
.tb tr:last-child td{border-bottom:none}
.tb tbody tr.click{cursor:pointer}
.tb tbody tr.click:hover{background:#FAFAFB}
.tb-wrap{overflow:auto;max-height:calc(100vh - 275px)}
.tb-wrap .tb thead th{position:sticky;top:0;background:var(--panel);z-index:2}
.tb-fixa{font-size:12.5px}
.tb-fixa th{white-space:nowrap}
.tb-fixa td{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:230px;padding-top:9px;padding-bottom:9px}
.field{margin-bottom:13px;min-width:0}
.field label{display:block;font-size:11.5px;font-weight:600;color:#48484A;margin-bottom:5px}
.field input,.field select,.field textarea{width:100%;border:1px solid var(--line2);border-radius:10px;
  padding:8.5px 11px;background:#fff}
.field textarea{min-height:82px;resize:vertical}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--green);
  box-shadow:0 0 0 3px rgba(0,89,79,.14)}
.check{display:flex;align-items:center;gap:9px;font-size:13.5px;padding:6px 2px;cursor:pointer}
.check input{width:16px;height:16px;accent-color:var(--green);flex-shrink:0;cursor:pointer}
.filters{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;margin-bottom:14px}
.filters .field{margin:0;min-width:140px}
.filters .field.grow{flex:1;min-width:200px}
.muted{color:var(--muted)}
.small{font-size:12.5px}
.empty{padding:32px;text-align:center;color:var(--muted);font-size:13.5px;line-height:1.6}
.banner{border-radius:12px;padding:12px 15px;font-size:13px;margin-bottom:14px;line-height:1.55;border:1px solid}
.banner.red{background:#FBF1F0;border-color:#EBC8C3;color:#8E2F23}
.banner.amber{background:#FBF5EA;border-color:#EAD7B3;color:#7A5311}
.banner.neutral{background:var(--soft);border-color:var(--line);color:#48484A}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:13px}
.bar-row .lb{width:180px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-row .tr{flex:1;background:var(--soft);border-radius:5px;height:8px;overflow:hidden}
.bar-row .fl{height:100%;background:var(--green);border-radius:5px}
.bar-row .vl{width:26px;text-align:right;font-weight:600}
.gal{display:grid;grid-template-columns:repeat(auto-fill,minmax(215px,1fr));gap:13px}
.tile{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:17px;cursor:pointer;
  box-shadow:var(--sh);transition:transform .12s, box-shadow .12s}
.tile:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,.07)}
.tile .sq{width:42px;height:42px;border-radius:13px;background:var(--soft);color:var(--green);
  display:flex;align-items:center;justify-content:center;margin-bottom:12px}
.tile .sq .ic{width:21px;height:21px}
.tile .tt{font-size:13.5px;font-weight:600;margin-bottom:4px}
.tile .td{font-size:12px;color:var(--muted);line-height:1.5}
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--line);margin-bottom:18px;flex-wrap:wrap}
.tabs button{background:none;border:none;padding:9px 14px;font-size:13.5px;font-weight:600;color:var(--muted);
  border-bottom:2px solid transparent;margin-bottom:-1px}
.tabs button.active{color:var(--ink);border-bottom-color:var(--green)}
.dl{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px 24px}
.dl .it dt{font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:3px;font-weight:600}
.dl .it dd{font-size:13.5px;word-break:break-word}
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(225px,1fr));gap:11px 15px}
.form-grid .full{grid-column:1/-1}
.timeline{position:relative;padding-left:20px}
.timeline::before{content:'';position:absolute;left:5px;top:6px;bottom:6px;width:1.5px;background:var(--line)}
.tl-item{position:relative;padding:0 0 17px 12px}
.tl-item::before{content:'';position:absolute;left:-19.5px;top:4.5px;width:9px;height:9px;border-radius:50%;
  background:var(--green);border:2px solid var(--panel);box-shadow:0 0 0 1.5px var(--line)}
.tl-item .dt{font-size:11px;color:var(--muted)}
.tl-item .tp{font-weight:600;margin:2px 0;font-size:13.5px}
.tl-item .ds{font-size:13px;line-height:1.55;white-space:pre-wrap}
.tl-item .rp{font-size:11.5px;color:var(--muted);margin-top:3px}
.acc-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:9px 2px;
  border-bottom:1px solid #F1F1F4;flex-wrap:wrap}
.acc-row:last-child{border-bottom:none}
.acc-row .nm{font-weight:600;min-width:190px;font-size:13.5px}
.acc-row .mt{flex:1;font-size:12px;color:var(--muted)}
.acc-group h4{font-size:10.5px;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);margin:16px 0 6px;font-weight:600}
.acc-group:first-child h4{margin-top:0}
.aval-card{border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:11px}
.aval-card .hd{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:7px}
.score{display:inline-flex;align-items:center;gap:6px;background:var(--soft);border-radius:8px;
  padding:3.5px 10px;font-size:11.5px;font-weight:600;margin-left:6px}
.light{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.lt-ok{background:var(--ok)}.lt-bad{background:var(--bad)}.lt-off{background:var(--line2)}
.seg{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;background:#fff}
.seg button{border:none;background:transparent;padding:5px 10px;font-size:11px;font-weight:600;color:var(--muted);
  display:inline-flex;align-items:center;gap:6px}
.seg button.on-ok{background:#E7F4EE;color:var(--ok)}
.seg button.on-bad{background:#FBEBE9;color:var(--bad)}
.org-wrap{max-width:820px;margin:0 auto}
.org-busca{position:relative;max-width:340px;margin:0 0 18px auto}
.org-res{position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:0 10px 26px rgba(0,0,0,.12);z-index:8;overflow:hidden;margin-top:4px}
.org-res .op{display:flex;align-items:center;gap:9px;padding:8px 12px;cursor:pointer;font-size:13px}
.org-res .op:hover{background:var(--soft)}
.org-chain{display:flex;flex-direction:column;align-items:center}
.org-link{width:1.5px;height:14px;background:var(--line2)}
.org-card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:9px 13px;display:flex;align-items:center;gap:10px;width:310px;max-width:100%;cursor:pointer;box-shadow:var(--sh);text-align:left;font-family:inherit}
.org-card:hover{border-color:var(--line2)}
.org-card .avatar{width:32px;height:32px;flex-shrink:0}
.org-card .tx{min-width:0;line-height:1.35}
.org-card .nm{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}
.org-card .cg{font-size:11.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}
.org-focus{width:390px;border:1.5px solid var(--green);padding:14px 16px;cursor:default}
.org-focus .avatar{width:46px;height:46px;font-size:15px}
.org-bottom{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:18px}
.org-sec h4{font-size:10.5px;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;font-weight:600}
.org-sec .org-card{width:100%;margin-bottom:8px}
@media (max-width:760px){.org-bottom{grid-template-columns:1fr}.org-card{width:100%}.org-focus{width:100%}}
.prog{height:6px;background:var(--soft);border-radius:4px;overflow:hidden;flex:1}
.prog .fl{height:100%;background:var(--green);border-radius:4px;transition:width .2s}
.chk-row{display:flex;align-items:flex-start;gap:10px;padding:8px 2px;border-bottom:1px solid #F1F1F4;font-size:13.5px;line-height:1.5}
.chk-row:last-child{border-bottom:none}
.chk-row input{width:16px;height:16px;accent-color:var(--green);margin-top:2px;flex-shrink:0;cursor:pointer}
.chk-row.feito span{color:var(--muted);text-decoration:line-through}
.multi{max-height:180px;overflow-y:auto;border:1px solid var(--line);border-radius:10px;padding:6px 10px;background:#fff}
.overlay{position:fixed;inset:0;background:rgba(29,29,31,.4);display:flex;align-items:flex-start;
  justify-content:center;padding:6vh 16px;z-index:50;overflow-y:auto;backdrop-filter:blur(3px)}
.modal{background:#fff;border-radius:16px;width:100%;max-width:620px;padding:24px;box-shadow:0 18px 50px rgba(0,0,0,.18)}
.modal h3{font-size:16.5px;font-weight:600;letter-spacing:-.2px;margin-bottom:16px}
.modal .actions{display:flex;justify-content:flex-end;gap:10px;margin-top:20px}
.modal.narrow{max-width:430px}
#toast{position:fixed;bottom:22px;right:22px;z-index:99;display:flex;flex-direction:column;gap:8px}
.toast{background:#1D1D1F;color:#F5F5F7;border-radius:11px;padding:11px 16px;font-size:13px;max-width:360px;
  box-shadow:0 8px 24px rgba(0,0,0,.25)}
.toast.err{background:#3A1D1A;color:#F1A9A0}
.dropzone{border:1.5px dashed var(--line2);border-radius:14px;padding:38px;text-align:center;color:var(--muted);
  background:#fff;cursor:pointer;line-height:1.7}
.dropzone:hover{border-color:var(--green)}
.dropzone b{color:var(--ink)}
.log{background:var(--soft);border-radius:10px;padding:12px 14px;font-family:ui-monospace,'SF Mono','Courier New',monospace;
  font-size:12px;line-height:1.7;max-height:260px;overflow-y:auto;white-space:pre-wrap}
@media (max-width:860px){
  #app{flex-direction:column}
  .sidebar,#app.rail .sidebar{width:100%;height:auto;position:static}
  .sb-nav{display:flex;flex-wrap:wrap;padding:4px 8px}
  .sb-nav button,#app.rail .sb-nav button{width:auto;padding:8px 11px}
  .sb-nav button .lb,#app.rail .sb-nav button .lb{display:inline}
  #sb-collapse{display:none}
  .content,.topbar{padding-left:15px;padding-right:15px}
}
</style>
</head>
<body>

<!-- ==================== LOGIN ==================== -->
<div id="login-view">
  <div class="lg-left">
    <div class="lg-logo"><span class="logo-slot"></span></div>
    <div class="lg-rodape">Sistema de Gestão de Recursos Humanos – Departamento de Pessoal da NeuroDynamics 2026</div>
  </div>
  <div class="lg-panel">
    <h1>Login</h1>
    <div id="config-warn" class="lg-warn" hidden>O sistema ainda não foi conectado ao banco de dados.
      Preencha o bloco <b>CONFIG</b> do index.html conforme o guia de implantação.</div>
    <div id="login-err" class="lg-err" hidden></div>
    <div class="lg-field"><label for="login-email">E-mail</label>
      <input id="login-email" type="email" autocomplete="username"></div>

  }catch(e){ $('#dash-ocorr').innerHTML='<div class="empty">Não foi possível carregar as ocorrências.</div>'; }

      if(desligados.length){
        const {data:ac} = await db.from('acessos_concedidos').select('registro').eq('ativo',true).in('registro', desligados);
        const n = new Set((ac||[]).map(a=>a.registro)).size;

      }
      const [{data:sin},{data:av}] = await Promise.all([
        db.from('apontamento_itens').select('id').eq('sinalizado',true).eq('tratado',false),
        db.from('avaliacoes').select('id').eq('encaminhar_pessoal',true).eq('tratado',false)
      ]);

      if(pend) html += `<div class="banner amber"><b>${pend} encaminhamento(s)</b> aguardando o
        <a href="#" onclick="showView('pessoal');return false">Painel do Depto de Pessoal</a>.</div>`;
    }
    const {data:evs} = await db.from('eventos').select('numero, titulo, data, tipo').eq('status','Preparação')
      .gte('data', hoje()).order('data').limit(3);
    if(evs&&evs.length) html += `<div class="banner neutral"><b>Próximos eventos:</b> ${evs.map(e=>
      `${esc(e.titulo)} (${fmtD(e.data)})`).join(' · ')} — <a href="#" onclick="showView('eventos');return false">ver eventos</a></div>`;

/* ---------------- lista de membros ---------------- */
function opcoesDe(campo){ return [...new Set(state.membros.map(m=>m[campo]).filter(Boolean))].sort(); }
function todosGrupos(){ return [...new Set(state.membros.flatMap(m=>m.grupos||[]))].sort(); }
function membrosFiltrados(){
  const f = state.filtros, q = norm(f.q);
  return state.membros.filter(m=>
    (!f.status || m.status===f.status) &&
    (!f.dep || m.departamento===f.dep) &&
    (!f.grupo || (m.grupos||[]).includes(f.grupo)) &&
    (!q || norm(m.nome).includes(q) || norm(m.email_nro).includes(q) || norm(m.email_pessoal).includes(q) || String(m.registro).includes(q))
  );
}

function datalistsHTML(){
  const dl=(id,vals)=>`<datalist id="${id}">${vals.map(v=>`<option value="${esc(v)}">`).join('')}</datalist>`;
  return dl('dl-deptos',opcoesDe('departamento')) + dl('dl-cargos',opcoesDe('cargo')) + dl('dl-formas',opcoesDe('forma_ingresso'));
}
function campoInput(c, val, regAtual){
  if(c.t==='select') return `<select id="f-${c.k}">${c.opts.map(o=>`<option ${o===val?'selected':''}>${o}</option>`).join('')}</select>`;
  if(c.t==='date')   return `<input type="date" id="f-${c.k}" value="${esc(val||'')}">`;
  if(c.t==='textarea') return `<textarea id="f-${c.k}">${esc(val||'')}</textarea>`;
  if(c.t==='bool')   return `<select id="f-${c.k}"><option value="" ${val==null?'selected':''}>—</option><option value="sim" ${val===true?'selected':''}>Sim</option><option value="nao" ${val===false?'selected':''}>Não</option></select>`;
  if(c.t==='gestor'){
    const opts = state.membros.filter(m=>m.status==='Ativo' && m.registro!==regAtual)
      .map(m=>`<option value="${m.registro}" ${m.registro===val?'selected':''}>${esc(m.nome)}</option>`).join('');
    return `<select id="f-${c.k}"><option value="">— sem gestor —</option>${opts}</select>`;
  }
  const v = c.t==='grupos' ? (val||[]).join(', ') : (val==null?'':val);
  return `<input id="f-${c.k}" value="${esc(v)}"${c.list?` list="${c.list}"`:''}>`;
}
function lerCampos(defs){
  const o={};
  defs.forEach(c=>{
    const el=document.getElementById('f-'+c.k); if(!el) return; let v=el.value;
    if(c.t==='grupos') o[c.k]=v.split(',').map(x=>x.trim()).filter(Boolean);
    else if(c.t==='bool') o[c.k]= v==='' ? null : v==='sim';
    else if(c.t==='gestor') o[c.k]= v==='' ? null : parseInt(v,10);
    else o[c.k]= String(v).trim()===''? null : String(v).trim();
  });
  return o;
}
function membroAtual(){ return state.membros.find(m=>m.registro===state.ficha.reg); }

async function abrirFicha(reg){
  state.ficha = {reg, tab:'dados', ocorr:[], acessos:[], avals:[], aponts:[], pess:null, editando:false};
  showView('ficha');
  $('#view-ficha').innerHTML = '<div class="empty">Carregando ficha…</div>';
  try{ await carregarFicha(); renderFicha(); }catch(e){ falha(e,'Erro ao abrir a ficha'); }
}
async function carregarFicha(){
  const reg = state.ficha.reg;
  const pr = [
    db.from('ocorrencias').select('*').eq('registro',reg).order('data',{ascending:false}).order('criado_em',{ascending:false}),
    db.from('acessos_concedidos').select('*').eq('registro',reg),
    db.from('avaliacoes').select('*').eq('registro',reg).order('data',{ascending:false}),
    db.from('apontamento_itens').select('*, apont:apontamentos(grupo, responsavel)').eq('registro',reg)
      .order('data',{ascending:false}).limit(12)
  ];
  if(can()) pr.push(db.from('dados_pessoais').select('*').eq('registro',reg).maybeSingle());
  const [o,a,v,ap,p] = await Promise.all(pr);
  state.ficha.ocorr=o.data||[]; state.ficha.acessos=a.data||[]; state.ficha.avals=v.data||[];
  state.ficha.aponts=ap.data||[]; state.ficha.pess = p ? (p.data||null) : null;
}

  $('#view-ficha').innerHTML = `
    <div class="card" style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
      <span class="avatar" style="width:52px;height:52px;font-size:17px">${iniciais(m.nome)}</span>
      <div style="flex:1;min-width:220px">
        <div style="font-size:17px;font-weight:600;letter-spacing:-.2px">${esc(m.nome)}</div>
        <div class="small muted" style="margin-top:2px"><span class="reg">REG ${String(m.registro).padStart(3,'0')}</span>
          · ${esc(m.cargo||'Sem cargo')} · ${esc(m.departamento||'Sem departamento')}${gestor?` · Gestor: ${esc(gestor)}`:''}</div>
        <div style="margin-top:7px">${(m.grupos||[]).map(g=>`<span class="chip">${esc(g)}</span>`).join('')}</div>
      </div>
      <div>${pill(m.status)}</div>
    </div>
    <div class="tabs">${tabs.map(([k,l])=>`<button class="${f.tab===k?'active':''}"
      onclick="state.ficha.tab='${k}';state.ficha.editando=false;renderFicha()">${l}</button>`).join('')}</div>
    <div id="ficha-body"></div>${datalistsHTML()}`;
  ({dados:renderTabDados, ocorr:renderTabOcorr, acessos:renderTabAcessos, avals:renderTabAvals, pess:renderTabPess}[f.tab])();

function renderTabDados(){

async function salvarMembro(){
  const m = membroAtual();
  const novo = lerCampos(CAMPOS_MEMBRO);
  if(!novo.nome){ toast('O nome é obrigatório.', true); return; }
  if(['Desligado','Egresso'].includes(novo.status) && !novo.data_desligamento) novo.data_desligamento = hoje();
  try{
    const {error} = await db.from('membros').update(novo).eq('registro', m.registro);
    if(error) throw error;
    const ocs = [];
    const oc = (tipo, descricao)=> ocs.push({registro:m.registro, tipo, descricao, responsavel:quemSouEu(), data:hoje()});
    if(novo.status !== m.status) oc(['Desligado','Egresso'].includes(novo.status)?'Desligamento':'Mudança de status', `De "${m.status||'—'}" para "${novo.status}".`);
    if(novo.cargo !== m.cargo) oc('Mudança de cargo', `De "${m.cargo||'—'}" para "${novo.cargo||'—'}".`);
    if(novo.departamento !== m.departamento) oc('Mudança de departamento', `De "${m.departamento||'—'}" para "${novo.departamento||'—'}".`);
    if((novo.gestor_registro||null) !== (m.gestor_registro||null))
      oc('Mudança de gestão', `De "${m.gestor_registro?nomeDe(m.gestor_registro):'—'}" para "${novo.gestor_registro?nomeDe(novo.gestor_registro):'—'}".`);
    const antes=m.grupos||[], depois=novo.grupos||[];
    const add=depois.filter(g=>!antes.includes(g)), rem=antes.filter(g=>!depois.includes(g));
    if(add.length) oc('Adição a grupo', add.join(', '));
    if(rem.length) oc('Remoção de grupo', rem.join(', '));
    if(ocs.length){ const r = await db.from('ocorrencias').insert(ocs); if(r.error) throw r.error; }
    Object.assign(m, novo);
    state.ficha.editando=false;
    await carregarFicha(); renderFicha();
    toast('Dados salvos.');
  }catch(e){ falha(e,'Erro ao salvar'); }
}
function modalMembro(){
  const prox = state.membros.length ? Math.max(...state.membros.map(x=>x.registro))+1 : 1;
  abreModal(`<h3>Novo membro</h3>
    <div class="form-grid">
      <div class="field"><label>Nº de registro</label><input id="f-registro" type="number" value="${prox}"></div>
      ${CAMPOS_MEMBRO.map(c=>`<div class="field ${c.full?'full':''}"><label>${c.l}</label>${campoInput(c, c.k==='status'?'Ativo':(c.k==='data_ingresso'?hoje():null), null)}</div>`).join('')}
    </div>${datalistsHTML()}
    <div class="actions"><button class="btn" onclick="fechaModal()">Cancelar</button>
    <button class="btn btn-primary" onclick="criarMembro()">Cadastrar</button></div>`);
}
async function criarMembro(){
  const novo = lerCampos(CAMPOS_MEMBRO);
  novo.registro = parseInt(document.getElementById('f-registro').value, 10);
  if(!novo.registro || !novo.nome){ toast('Registro e nome são obrigatórios.', true); return; }
  if(state.membros.some(x=>x.registro===novo.registro)){ toast('Já existe um membro com esse número de registro.', true); return; }
  try{
    const {error} = await db.from('membros').insert(novo); if(error) throw error;
    await db.from('ocorrencias').insert({registro:novo.registro, tipo:'Ingresso',
      descricao:`Ingresso via ${novo.forma_ingresso||'cadastro manual'}.`, responsavel:quemSouEu(), data:novo.data_ingresso||hoje()});
    state.membros.push(novo); state.membros.sort((a,b)=>a.registro-b.registro);
    fechaModal(); toast('Membro cadastrado.'); abrirFicha(novo.registro);
  }catch(e){ falha(e,'Erro ao cadastrar'); }
}

/* ------------- organização (Org Explorer, estilo Microsoft Teams) ------------- */
let orgFoco = null;
function orgAtivos(){ return state.membros.filter(m => ['Ativo', 'Em pausa / avaliação'].includes(m.status)); }
function orgGestorDe(m, ativos){ return (m.gestor_registro && ativos.find(x=>x.registro===m.gestor_registro)) || null; }
function orgRaiz(ativos){
  const raizes = ativos.filter(m=>!orgGestorDe(m, ativos));
  const nsub = (r)=> ativos.filter(m=>m.gestor_registro===r).length;
  return (raizes.length?raizes:ativos).slice().sort((a,b)=>nsub(b.registro)-nsub(a.registro))[0];
}
function renderOrganizacao(){
  setTopo(PAGE_TITLES.organizacao, null, '');
  const ativos = orgAtivos();
  if(!ativos.length){ $('#view-organizacao').innerHTML='<div class="empty">Nenhum membro ativo cadastrado.</div>'; return; }
  if(!orgFoco || !ativos.some(m=>m.registro===orgFoco)){
    const eu = ativos.find(m=>[m.email_nro,m.email_pessoal].some(e=>e && norm(e)===norm(state.perfil.email)));
    orgFoco = (eu || orgRaiz(ativos)).registro;
  }
  desenhaOrg('');
}
function focarOrg(reg){ orgFoco = reg; desenhaOrg(''); }
function cartaoOrg(m, ativos){
  const lidera = ativos.filter(x=>x.gestor_registro===m.registro).length;
  return `<button class="org-card" onclick="focarOrg(${m.registro})" title="${esc(m.nome)}">
    <span class="avatar">${iniciais(m.nome)}</span>
    <span class="tx"><span class="nm">${esc(m.nome)}</span>
    <span class="cg">${esc(m.cargo||'—')}${lidera?` · lidera ${lidera}`:''}</span></span></button>`;
}
function desenhaOrg(filtro){
  const ativos = orgAtivos();
  const foco = ativos.find(m=>m.registro===orgFoco);
  if(!foco){ orgFoco=null; renderOrganizacao(); return; }
  // corrente de comando (do topo até o gestor imediato), com proteção contra ciclos
  const cadeia = []; const vistos = new Set([foco.registro]);
  let g = orgGestorDe(foco, ativos);
  while(g && !vistos.has(g.registro) && cadeia.length<12){ cadeia.unshift(g); vistos.add(g.registro); g = orgGestorDe(g, ativos); }
  const gestorImediato = cadeia.length ? cadeia[cadeia.length-1] : null;
  const colegas = ativos.filter(m=> m.registro!==foco.registro &&
      (gestorImediato ? m.gestor_registro===gestorImediato.registro : !orgGestorDe(m, ativos)))
    .sort((a,b)=>a.nome.localeCompare(b.nome,'pt-BR'));
  const sub = ativos.filter(m=>m.gestor_registro===foco.registro)
    .sort((a,b)=>a.nome.localeCompare(b.nome,'pt-BR'));
  const q = norm(filtro);
  const achados = q ? ativos.filter(m=>norm(m.nome).includes(q) && m.registro!==foco.registro).slice(0,6) : [];
  $('#view-organizacao').innerHTML = `<div class="org-wrap">
    <div class="org-busca"><div class="field" style="margin:0">
      <input id="org-q" placeholder="Buscar por nome…" value="${esc(filtro)}" oninput="desenhaOrg(this.value)"></div>
      ${achados.length?`<div class="org-res">${achados.map(m=>`<div class="op" onclick="focarOrg(${m.registro})">
        <span class="avatar" style="width:26px;height:26px;font-size:10px">${iniciais(m.nome)}</span>
        <span>${esc(m.nome)} <span class="muted small">· ${esc(m.cargo||'')}</span></span></div>`).join('')}</div>`:''}
    </div>
    <div class="org-chain">
      ${cadeia.map(m=>cartaoOrg(m, ativos)+'<span class="org-link"></span>').join('')}
      <div class="org-card org-focus">
        <span class="avatar">${iniciais(foco.nome)}</span>
        <span class="tx" style="flex:1">
          <span class="nm" style="font-size:14.5px">${esc(foco.nome)}</span>
          <span class="cg" style="white-space:normal">${esc(foco.cargo||'—')} · ${esc(foco.departamento||'—')}</span>
          <span class="small" style="display:block;margin-top:2px">${esc(foco.email_nro||foco.email_pessoal||'')}${foco.telefone?' · '+esc(foco.telefone):''}</span>
          <a href="#" class="small" onclick="abrirFicha(${foco.registro});return false">Abrir ficha completa</a>
        </span>
        <span>${pill(foco.status)}</span>
      </div>
    </div>
    <div class="org-bottom">
      <div class="org-sec"><h4>Colegas de equipe (${colegas.length})</h4>
        ${colegas.length? colegas.map(m=>cartaoOrg(m, ativos)).join('') : '<div class="empty" style="padding:14px">Ninguém mais responde ao mesmo gestor.</div>'}</div>
      <div class="org-sec"><h4>Subordinados diretos (${sub.length})</h4>
        ${sub.length? sub.map(m=>cartaoOrg(m, ativos)).join('') : '<div class="empty" style="padding:14px">Sem subordinados diretos. Defina o "Gestor imediato" na ficha dos liderados.</div>'}</div>
    </div>
  </div>`;
  if(q){ const inp = document.getElementById('org-q');
    if(inp){ inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length); } }
}

/* ---------------- PDF: modelo de documento NRO ---------------- */
const pad3 = (n)=> String(n).padStart(3,'0');
function pdfNovo(orient){ const {jsPDF}=window.jspdf; return new jsPDF({orientation:orient||'portrait',unit:'mm',format:'a4'}); }
function desenhaLogo(doc,x,y,s,cor){
  doc.setFillColor(cor[0],cor[1],cor[2]);
  doc.circle(x+s*0.33, y+s*0.5, s*0.24, 'F');
  doc.circle(x+s*0.8,  y+s*0.26, s*0.13, 'F');
  doc.circle(x+s*0.8,  y+s*0.74, s*0.13, 'F');
  doc.setDrawColor(cor[0],cor[1],cor[2]); doc.setLineWidth(s*0.075);
  doc.line(x+s*0.5, y+s*0.42, x+s*0.68, y+s*0.31);
  doc.line(x+s*0.5, y+s*0.58, x+s*0.68, y+s*0.69);
}
function pdfCabecalho(doc, titulo, subtitulo, codigo){
  const W = doc.internal.pageSize.getWidth();
  // Modelo NRO-PUB-002: logo à esquerda; à direita, alinhado à direita:
  // Departamento (negrito) / [Título do documento ou registro] / código Rev.
  if(LOGO_PDF){
    const h = 8, w = Math.min(h*LOGO_PDF.prop, 68);
    doc.addImage(LOGO_PDF.dados, 'PNG', 12, 9, w, h);
  } else {
    desenhaLogo(doc, 12, 9, 8, [29,29,31]);
    doc.setTextColor(29,29,31); doc.setFont('helvetica','bold'); doc.setFontSize(11.5);
    doc.text('NeuroDynamics', 21.5, 14.6);
  }
  doc.setTextColor(29,29,31); doc.setFontSize(9.5);
  doc.setFont('helvetica','normal');
  let tt = titulo;
  while(tt.length>10 && doc.getTextWidth(tt) > W-108) tt = tt.slice(0,-2);
  if(tt !== titulo) tt = tt.trim()+'…';
  doc.setFont('helvetica','bold');
  doc.text('Departamento de Pessoal', W-12, 10.8, {align:'right'});
  doc.setFont('helvetica','normal');
  doc.text(tt, W-12, 15, {align:'right'});
  doc.text(codigo || 'NRO-SYS-001 Rev. A', W-12, 19.2, {align:'right'});
  // Título principal no corpo do documento
  let y = 33;
  doc.setFont('helvetica','bold'); doc.setFontSize(15);
  const tl = doc.splitTextToSize(titulo, W-24);
  doc.text(tl, 12, y); y += tl.length*6.6 + 1.5;
  if(subtitulo){
    doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(96,96,99);
    const ls = doc.splitTextToSize(subtitulo, W-24);
    doc.text(ls, 12, y); y += ls.length*4.2 + 2;
  }
  doc.setTextColor(29,29,31);
  return y + 3;
}
function pdfRodape(doc, texto){
  const W = doc.internal.pageSize.getWidth(), H = doc.internal.pageSize.getHeight();
  const total = doc.getNumberOfPages();
  for(let i=1;i<=total;i++){
    doc.setPage(i); doc.setFontSize(7.5); doc.setTextColor(110,110,115);
    doc.text(texto || `NRO-SYS-001 · uso interno · gerado por ${quemSouEu()} em ${new Date().toLocaleDateString('pt-BR')}`, 12, H-8);
    doc.text(`Página ${i} de ${total}`, W-12, H-8, {align:'right'});
  }
}
function pdfBloco(doc, y, titulo, texto){
  const W = doc.internal.pageSize.getWidth(), H = doc.internal.pageSize.getHeight();
  if(y > H-35){ doc.addPage(); y = 16; }
  doc.setFont('helvetica','bold'); doc.setFontSize(10.5); doc.setTextColor(29,29,31);
  doc.text(titulo, 12, y); y += 5.5;
  doc.setFont('helvetica','normal'); doc.setFontSize(9.5); doc.setTextColor(60,60,64);
  const ls = doc.splitTextToSize(texto || '—', W-24);
  for(const linha of ls){
    if(y > H-18){ doc.addPage(); y = 16; }
    doc.text(linha, 12, y); y += 4.5;
  }
  return y + 5;
}
async function buscarMatriculas(regs){
  const map = new Map();
  for(let i=0;i<regs.length;i+=100){
    const {data, error} = await db.from('dados_pessoais').select('registro, matricula').in('registro', regs.slice(i,i+100));
    if(error) throw error;
    (data||[]).forEach(d=> map.set(d.registro, d.matricula));
  }
  return map;
}
function statusCheckboxes(cls, iniciaisSel){
  return `<div class="multi" style="max-height:none">${STATUS_LIST.map(s=>`<label class="check">
    <input type="checkbox" class="${cls}" value="${s}" ${iniciaisSel.includes(s)?'checked':''}> ${s}</label>`).join('')}</div>`;

function filtraPorSelecao(sts, grupos){
  return state.membros.filter(m=>
    (!sts.length || sts.includes(m.status)) &&
    (!grupos.length || (m.grupos||[]).some(g=>grupos.includes(g)))
  ).sort((a,b)=>a.nome.localeCompare(b.nome, 'pt-BR'));
}

function secaoTabela(doc, y, titulo, head, body, colStyles){
  const H = doc.internal.pageSize.getHeight();
  if(y > H-40){ doc.addPage(); y = 16; }
  doc.setFont('helvetica','bold'); doc.setFontSize(10.5); doc.setTextColor(29,29,31);
  doc.text(titulo, 12, y);
  doc.autoTable({ startY:y+2.5, head:head||undefined, body, theme:'striped',
    styles:{font:'helvetica', fontSize:8.5, cellPadding:1.8, textColor:[29,29,31]},
    headStyles:{fillColor:[29,29,31], textColor:[245,245,247], fontSize:8.5},
    alternateRowStyles:{fillColor:[246,246,248]},
    columnStyles:colStyles||{}, margin:{left:12,right:12} });
  return doc.lastAutoTable.finalY + 8;
}
function gerarRelatorioMembro(){
  try{
    const m = membroAtual(); if(!m) return;
    const f = state.ficha;
    const temPess = can() && !!f.pess;
    const doc = pdfNovo();
    let y = pdfCabecalho(doc, 'FICHA DO MEMBRO — '+m.nome.toUpperCase(),
      `Registro ${pad3(m.registro)} · ${m.status} · Emitida em ${new Date().toLocaleDateString('pt-BR')}`
      + (temPess?' · CONFIDENCIAL — contém dados pessoais protegidos pela LGPD':''));
    const rot = {0:{fontStyle:'bold', cellWidth:58}};
    const inst = CAMPOS_MEMBRO.filter(c=>c.k!=='nome').map(c=>{
      let v = m[c.k];
      if(c.t==='grupos') v = (v||[]).join(', ');
      else if(c.t==='date') v = v? fmtD(v) : '';
      else if(c.t==='gestor') v = v? (nomeDe(v)||'') : '';
      return [c.l.replace(' (separados por vírgula)',''), v||'—'];
    });
    y = secaoTabela(doc, y, 'DADOS INSTITUCIONAIS', null, inst, rot);
    if(f.acessos.length){
      const porItem = new Map(state.itens.map(i=>[i.id, i]));
      const corpo = f.acessos.map(a=>{ const it = porItem.get(a.item_id);
        return [it?it.nome:'—', a.ativo?'Concedido':'Revogado',
          a.ativo?(a.concedido_em?fmtD(a.concedido_em):'—'):(a.revogado_em?fmtD(a.revogado_em):'—'), a.responsavel||'—'];
      }).sort((a,b)=>a[0].localeCompare(b[0],'pt-BR'));
      y = secaoTabela(doc, y, 'ACESSOS', [['Item','Situação','Data','Responsável']], corpo);
    }
    if(f.ocorr.length) y = secaoTabela(doc, y, 'OCORRÊNCIAS', [['Data','Tipo','Descrição','Responsável']],
      f.ocorr.map(o=>[fmtD(o.data), o.tipo, o.descricao||'—', o.responsavel||'—']), {2:{cellWidth:76}});

async function gerarListaPortaria(){
  const grupos = marcados('g-port'), sts = marcados('s-port'), locais = marcados('l-port');
  const respNome = $('#rp-nome').value.trim(), respTel = $('#rp-tel').value.trim();
  const dataAc = $('#rp-data').value, horaAc = $('#rp-hora').value.trim();
  if(!locais.length){ toast('Selecione pelo menos um local de acesso.', true); return; }
  if(!respNome || !respTel){ toast('Informe o nome e o telefone do responsável.', true); return; }
  try{
    const lista = filtraPorSelecao(sts.length?sts:['Ativo'], grupos);
    if(!lista.length){ toast('Nenhum membro com esses filtros.', true); return; }
    const mats = await buscarMatriculas(lista.map(m=>m.registro));
    const doc = pdfNovo();
    const sub = `Locais: ${locais.join(' e ')}`
      + (dataAc?`\nData do acesso: ${fmtD(dataAc)}${horaAc?' · Horário: '+horaAc:''}`:(horaAc?`\nHorário: ${horaAc}`:''))
      + (grupos.length?`\nGrupos: ${grupos.join(', ')}`:'')
      + `\nEmitida em ${new Date().toLocaleDateString('pt-BR')} · ${lista.length} pessoa(s)`;
    const y = pdfCabecalho(doc, 'LISTA PARA ACESSO — ESCOLA DE ENGENHARIA', sub);
    doc.autoTable({ startY:y, theme:'grid',
      head:[['Nome','Matrícula','Assinatura']],
      body:lista.map(m=>[m.nome, mats.get(m.registro)||'—','']),
      styles:{font:'helvetica', fontSize:9, cellPadding:2.2, textColor:[29,29,31], lineColor:[210,210,215], lineWidth:.25, minCellHeight:9},
      headStyles:{fillColor:[29,29,31], textColor:[245,245,247], fontSize:9},
      columnStyles:{0:{cellWidth:86},1:{cellWidth:38},2:{cellWidth:'auto'}}, margin:{left:12,right:12} });
    let fy = doc.lastAutoTable.finalY + 9;
    if(fy > doc.internal.pageSize.getHeight()-22){ doc.addPage(); fy = 16; }
    doc.setFont('helvetica','normal'); doc.setFontSize(9.5); doc.setTextColor(29,29,31);
    doc.text(`Em caso de dúvidas, contatar ${respNome} em ${respTel}.`, 12, fy);
    pdfRodape(doc);
    doc.save(`NRO-PES_lista_portaria_${hoje()}.pdf`);
    const corpo = encodeURIComponent(
`Prezados,

Solicitamos a autorização de entrada na Escola de Engenharia para as pessoas relacionadas na lista em anexo.

Local (portaria): ${locais.join(' e ')}
${dataAc?'Data: '+fmtD(dataAc)+'\n':''}${horaAc?'Horário: '+horaAc+'\n':''}Total de pessoas: ${lista.length}

Em caso de dúvidas, contatar ${respNome} em ${respTel}.

Atenciosamente,
Departamento de Pessoal — NeuroDynamics`);
    const assunto = encodeURIComponent(`Autorização de acesso — NeuroDynamics${dataAc?' — '+fmtD(dataAc):''}`);
    abreModal(`<h3>Lista gerada</h3>
      <p style="line-height:1.6">O PDF foi baixado. Para prosseguir, abra o e-mail para a Seção de Logística —
      o texto já vai pronto, com cópia para marcondes@neurodynamics.dev. <b>Anexe o PDF que acabou de ser baixado</b> antes de enviar
      (por segurança, o navegador não anexa arquivos sozinho).</p>
      <div class="actions"><button class="btn" onclick="fechaModal()">Fechar</button>
      <a class="btn btn-primary" href="mailto:slog@eng.ufmg.br?cc=marcondes@neurodynamics.dev&subject=${assunto}&body=${corpo}"
        onclick="fechaModal()">${ic('mail')} Prosseguir: e-mail à SLOG</a></div>`, true);
  }catch(e){ falha(e,'Erro ao gerar a lista'); }
}

async function gerarAutorizados(){
  const itemId = $('#au-item').value, grupos = marcados('g-aut'), sts = marcados('s-aut');
  const item = state.itens.find(i=>i.id===itemId);

    const {data, error} = await db.from('acessos_concedidos').select('registro, concedido_em').eq('item_id', itemId).eq('ativo', true);

    const desde = new Map((data||[]).map(a=>[a.registro, a.concedido_em]));
    const lista = filtraPorSelecao(sts, grupos).filter(m=>desde.has(m.registro));

    doc.autoTable({ startY:y, theme:'striped',
      head:[['Reg.','Nome','Departamento','Status','Concedido em']],
      body:lista.map(m=>[pad3(m.registro), m.nome, m.departamento||'—', m.status, desde.get(m.registro)?fmtD(desde.get(m.registro)):'—']),

function exportarExcelQuadro(){
  try{
    const lista = filtraPorSelecao(marcados('s-qd'), marcados('g-qd'));
    const rows = lista.map(m=>({
      'Registro':m.registro,'Status':m.status,'Nome':m.nome,'Departamento':m.departamento||'',
      'Cargo':m.cargo||'','Gestor imediato':m.gestor_registro?(nomeDe(m.gestor_registro)||''):'',
      'Grupos':(m.grupos||[]).join(', '),'E-mail NRO':m.email_nro||'','E-mail pessoal':m.email_pessoal||'',
      'Telefone':m.telefone||'','Data de ingresso':m.data_ingresso?fmtD(m.data_ingresso):'',
      'Forma de ingresso':m.forma_ingresso||'','Data de desligamento':m.data_desligamento?fmtD(m.data_desligamento):'',
      'Projeto no fomento':m.projeto_fomento||'','Classificação':m.classificacao||'','Bolsa':m.bolsa||''
    }));
    const ws = XLSX.utils.json_to_sheet(rows);
    ws['!cols'] = [{wch:8},{wch:18},{wch:38},{wch:26},{wch:24},{wch:30},{wch:40},{wch:30},{wch:30},{wch:16},{wch:14},{wch:20},{wch:14},{wch:18},{wch:16},{wch:12}];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'QUADRO');
    XLSX.writeFile(wb, `NRO-PES_quadro_${hoje()}.xlsx`);
    fechaModal(); toast('Excel gerado.');
  }catch(e){ falha(e,'Erro ao exportar'); }

      <p class="small muted" style="line-height:1.6;margin-bottom:14px">Selecione o grupo sob a sua liderança.

function iniciarApontamento(){
  const g = $('#ap-grupo').value;
  const itens = state.membros
    .filter(m=>['Ativo','Em pausa / avaliação'].includes(m.status) && (m.grupos||[]).includes(g))
    .sort((a,b)=>a.nome.localeCompare(b.nome,'pt-BR'))
    .map(m=>({registro:m.registro, nome:m.nome, cargo:m.cargo, status:m.status,
      assiduidade:'SUFICIENTE', entregas:'SUFICIENTE', sinalizado:false, justificativa:null, abrirOcorrencia:false}));
  if(!itens.length){ toast('Esse grupo não tem membros ativos ou em pausa.', true); return; }
  state.apont = {grupo:g, itens};

async function clicarFlag(i){
  const it = state.apont.itens[i];
  if(it.sinalizado){ it.sinalizado=false; it.justificativa=null; it.abrirOcorrencia=false; renderApontamentoLista(); return; }
  let recentes = [];
  try{
    const desde = new Date(Date.now()-30*864e5).toISOString().slice(0,10);
    const {data} = await db.from('apontamento_itens').select('data').eq('registro',it.registro)
      .eq('sinalizado',true).gte('data',desde).order('data',{ascending:false});
    recentes = data||[];
  }catch(e){ /* segue sem histórico */ }
  const reinc = recentes.length>0;
  abreModal(`<h3>Sinalizar ${esc(it.nome)}</h3>
    ${reinc?`<div class="banner amber"><b>Sinalização reincidente:</b> a última foi em ${fmtD(recentes[0].data)},
      dentro da janela de 30 dias. Você pode abrir uma ocorrência formal junto com esta sinalização —
      nesses casos, o Depto de Pessoal agenda uma reunião com o membro.</div>`
    :`<div class="banner neutral">Primeira sinalização recente. O Depto de Pessoal será orientado a <b>fazer contato</b> com o membro para avaliar o comprometimento e dialogar.</div>`}
    <div class="field"><label>Justificativa</label><select id="sn-just">${JUSTIFICATIVAS.map(j=>`<option>${j}</option>`).join('')}</select></div>
    <div class="field"><label>Detalhes (opcional)</label><textarea id="sn-det" placeholder="Contexto que ajude o Depto de Pessoal…"></textarea></div>
    ${reinc?`<div class="field"><label class="check"><input type="checkbox" id="sn-oc" checked> Abrir ocorrência de "Sinalização reincidente" na ficha do membro</label></div>`:''}
    <div class="actions"><button class="btn" onclick="fechaModal()">Cancelar</button>
    <button class="btn btn-primary" onclick="confirmarSinalizacao(${i}, ${reinc})">${ic('flag')} Sinalizar</button></div>`);
}
function confirmarSinalizacao(i, reinc){
  const it = state.apont.itens[i];
  const det = $('#sn-det').value.trim();
  it.sinalizado = true;
  it.justificativa = $('#sn-just').value + (det? ' — '+det : '');

async function salvarApontamento(){
  const a = state.apont; if(!a) return;
  try{
    const {data:cab, error} = await db.from('apontamentos')
      .insert({grupo:a.grupo, data:hoje(), responsavel:quemSouEu(), responsavel_id:state.perfil.id})
      .select('id').single();
    if(error) throw error;
    const itens = a.itens.map(it=>({apontamento_id:cab.id, registro:it.registro, data:hoje(),
      assiduidade:it.assiduidade, entregas:it.entregas, sinalizado:it.sinalizado, justificativa:it.justificativa}));
    const r = await db.from('apontamento_itens').insert(itens);
    if(r.error) throw r.error;
    const ocs = a.itens.filter(it=>it.abrirOcorrencia).map(it=>({registro:it.registro,
      tipo:'Sinalização reincidente', descricao:it.justificativa, responsavel:quemSouEu(), data:hoje()}));
    if(ocs.length){ const r2 = await db.from('ocorrencias').insert(ocs); if(r2.error) throw r2.error; }
    const nSin = a.itens.filter(x=>x.sinalizado).length;
    state.apont = null;

      <div class="sq" style="width:52px;height:52px;border-radius:16px;background:var(--soft);color:var(--green);display:inline-flex;align-items:center;justify-content:center;margin-bottom:14px">${ic('check')}</div>

async function criarEvento(){
  const tipo = $('#ev-tipo').value, dataEv = $('#ev-data').value||null;
  const titulo = $('#ev-tit').value.trim() || `${tipo}${dataEv?' — '+fmtD(dataEv):''}`;
  const grupos = marcados('g-ev'), extras = marcados('p-ev').map(Number);
  const owner = parseInt($('#ev-owner').value,10)||null;
  try{
    const hi = $('#ev-hini').value||null, hf = $('#ev-hfim').value||null;
    const espSel = $('#ev-espaco'), espId = espSel && espSel.value ? parseInt(espSel.value,10) : null;
    const localTxt = espId ? espSel.selectedOptions[0].text : ($('#ev-local').value.trim()||null);
    const {data:ev, error} = await db.from('eventos').insert({titulo, tipo, data:dataEv,
      hora: hi ? (hf ? `${hi} às ${hf}` : hi) : null,
      hora_inicio: hi, hora_fim: hf, espaco_id: espId, local: localTxt,
      recorrencia:$('#ev-rec').value, owner_registro:owner, grupos, criado_por:quemSouEu()}).select('*').single();
    if(error) throw error;
    const regs = new Set(extras);
    if(owner) regs.add(owner);
    state.membros.filter(m=>m.status==='Ativo' && (m.grupos||[]).some(g=>grupos.includes(g))).forEach(m=>regs.add(m.registro));
    if(regs.size){
      const parts = [...regs].map(r=>({evento_id:ev.id, registro:r, origem: extras.includes(r)&&!grupos.length?'manual':'grupo'}));
      const r1 = await db.from('evento_participantes').insert(parts); if(r1.error) throw r1.error;
    }
    const modelo = CHECKLISTS[tipo]||CHECKLISTS['Outro'];
    const r2 = await db.from('evento_checklist').insert(modelo.map((item,ix)=>({evento_id:ev.id, item, ordem:(ix+1)*10})));
    if(r2.error) throw r2.error;
    fechaModal(); toast(`Evento EVT-${pad3(ev.numero)} criado.`);
    abrirEvento(ev.id);
  }catch(e){ falha(e,'Erro ao criar o evento'); }
}
async function abrirEvento(id){
  showView('evento');
  $('#view-evento').innerHTML = '<div class="empty">Carregando evento…</div>';
  try{
    const [{data:ev, error:e1},{data:parts, error:e2},{data:chk, error:e3}] = await Promise.all([
      db.from('eventos').select('*').eq('id',id).single(),
      db.from('evento_participantes').select('*, membro:membros(nome, cargo)').eq('evento_id',id),
      db.from('evento_checklist').select('*').eq('evento_id',id).order('ordem')
    ]);
    if(e1||e2||e3) throw (e1||e2||e3);
    parts.sort((a,b)=> (a.membro?.nome||'').localeCompare(b.membro?.nome||'','pt-BR'));
    state.evento = {ev, parts, chk, tab:'prep'};
    renderEvento();
  }catch(e){ falha(e,'Erro ao abrir o evento'); }
}

    const maxOrd = Math.max(0, ...state.evento.chk.map(c=>c.ordem));

      .insert({evento_id:state.evento.ev.id, item, ordem:maxOrd+10}).select('*').single();

async function toggleChecklist(id, feito){

async function setPresenca(id, v){

function gerarAta(){
  try{
    const {ev, parts} = state.evento;
    const doc = pdfNovo();
    let y = pdfCabecalho(doc, 'ATA — '+ev.titulo.toUpperCase(),
      `Registro EVT-${pad3(ev.numero)} · ${ev.tipo} · ${fmtD(ev.data)}${ev.hora?' às '+ev.hora:''}${ev.local?' · '+ev.local:''}`
      + ` · Organizador: ${ev.owner_registro?(nomeDe(ev.owner_registro)||'—'):'—'}`);
    y = pdfBloco(doc, y+2, 'PAUTA', ev.pauta);
    y = pdfBloco(doc, y, 'DELIBERAÇÕES', ev.deliberacoes);
    if(y > doc.internal.pageSize.getHeight()-50){ doc.addPage(); y = 16; }
    doc.setFont('helvetica','bold'); doc.setFontSize(10.5); doc.setTextColor(29,29,31);
    doc.text('PRESENÇAS', 12, y);
    doc.autoTable({ startY:y+3, theme:'striped',
      head:[['Participante','Situação']],
      body:parts.map(p=>[p.membro?.nome||('Reg. '+p.registro), p.presente===true?'Presente':(p.presente===false?'Ausente':'—')]),
      styles:{font:'helvetica', fontSize:9, cellPadding:2, textColor:[29,29,31]},
      headStyles:{fillColor:[29,29,31], textColor:[245,245,247], fontSize:9},
      alternateRowStyles:{fillColor:[246,246,248]}, margin:{left:12,right:12} });
    let fy = doc.lastAutoTable.finalY + 20;
    if(fy > doc.internal.pageSize.getHeight()-25){ doc.addPage(); fy = 36; }
    doc.setDrawColor(29,29,31); doc.setLineWidth(.3); doc.line(12, fy, 95, fy);

const MAPA_INST = {'REGISTRO':'registro','STATUS':'status','NOME':'nome','DEPARTAMENTO':'departamento',
  'CARGO ATUAL':'cargo','GRUPOS':'grupos','EMAIL NRO':'email_nro','EMAIL PESSOAL':'email_pessoal','TELEFONE':'telefone',
  'DATA DE INGRESSO':'data_ingresso','FORMA DE INGRESSO':'forma_ingresso','DATA DE DESLIGAMENTO':'data_desligamento',
  'PROJETO REGISTRADO NO SISTEMA DE FOMENTO':'projeto_fomento','CLASSIFICAÇÃO':'classificacao','BOLSA':'bolsa',
  'DATA DE ENCERRAMENTO':'data_encerramento'};
const MAPA_ACESSOS = {
  'POSSUI TERMO DE SIGILO DO LABBIO ASSINADO?':'Termo de sigilo — LABBIO',
  'POSSUI TERMO DE SIGILO DA VISURI ASSINADO?':'Termo de sigilo — Visuri',
  'POSSUI TERMO DE SIGILO DA NRO ASSINADO?':'Termo de sigilo — NRO',
  'ACESSO BIOMÉTRICO AO LABBIO':'Biometria — LABBIO',
  'ACESSO BIOMÉTRICO AO LEB':'Biometria — LEB',
  'PASTAS COM ACESSO NO DRIVE CTA-EEUFMG':'Drive CTA-EEUFMG',
  'ACESSO A TIMES NO GITHUB CTA-EEUFMG':'GitHub CTA-EEUFMG',
  'ACESSO À CONTA DE EMAIL ZIMBRA':'E-mail Zimbra',
  'ACESSO À CONTA GOOGLE NRO':'Conta Google NRO',
  'ACESSO À CONTA GOOGLE CTA-EEUFMG':'Conta Google CTA-EEUFMG',
  'ACESSO AO TIME CANVA':'Canva',
  'ACESSO AO INSTAGRAM':'Instagram',
  'ACESSO AO LINKEDIN':'LinkedIn',
  'ACESSO AO WIX':'Wix',
  'ACESSO AO CLOUDFLARE':'Cloudflare',
  'ACESSO AO WHATSAPP BUSINESS':'WhatsApp Business',
  'ACESSO AO NOTION':'Notion'};
const MAPA_FORM = {'CPF':'cpf','DATA DE NASCIMENTO':'data_nascimento','ENDEREÇO':'endereco','CIDADE DE ORIGEM':'cidade_origem',
  'INSTITUIÇÃO DE ENSINO':'instituicao','CURSO':'curso','MATRÍCULA':'matricula','PERÍODO DE INGRESSO':'periodo_ingresso',
  'BACKGROUND':'background','LINK DO CURRÍCULO LATTES':'lattes','TEMPO DE DESLOCAMENTO ATÉ A UNIVERSIDADE':'tempo_deslocamento',
  'AUTODECLARAÇÃO RACIAL':'autodeclaracao_racial','SITUAÇÃO JUNTO À FUMP':'situacao_fump',
  'NECESSIDADES ESPECÍFICAS DE ACESSIBILIDADE':'acessibilidade','GÊNERO':'genero','PERFIL DO INSTAGRAM':'instagram',
  'USUÁRIO DO GITHUB':'github'};
let pacote = null;

const t = (v)=>{ if(v==null) return null; const s=String(v).trim(); return s===''||s==='--' ? null : s; };
const textoNum = (v)=>{ if(v==null||v==='') return null; if(typeof v==='number') return v.toFixed(0); return t(v); };
const ehVerdade = (v)=> v===true || String(v).trim().toUpperCase()==='TRUE';
function dataISO(v){
  if(v==null||v==='') return null;
  if(typeof v==='number'){ if(v<20000||v>80000) return null;
    return new Date(Math.round((v-25569)*86400*1000)).toISOString().slice(0,10); }
  if(v instanceof Date && !isNaN(v)) return v.toISOString().slice(0,10);
  const s=String(v).trim();
  let m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/); if(m) return `${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;
  if(/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0,10);
  return null;
}
function normLinhas(ws){
  return XLSX.utils.sheet_to_json(ws, {defval:null, raw:true}).map(r=>{
    const o={}; Object.keys(r).forEach(k=> o[k.trim().toUpperCase()] = r[k]); return o;
  });
}
function renderImportar(){
  pacote = null;
  setTopo(PAGE_TITLES.importar, "showView('operacoes')", '');
  $('#view-importar').innerHTML = `
    <div class="card"><h3>Importar a planilha NRO-PES-005</h3>
      <p class="small muted" style="line-height:1.65;margin-bottom:16px">
        Selecione o arquivo .xlsx do quadro de pessoal. O sistema reconhece as abas
        <b>INSTITUCIONAL</b> (membros), <b>FORM</b> (dados pessoais) e <b>ACESSOS</b> (concessões marcadas como TRUE).
        Registros existentes são atualizados pelo número de registro — pode importar quantas vezes quiser sem duplicar.</p>
      <div class="dropzone" onclick="document.getElementById('imp-file').click()">
        Clique para selecionar o arquivo<br><b>NRO-PES-005_QUADRO_DE_PESSOAL.xlsx</b>
      </div>
      <input id="imp-file" type="file" accept=".xlsx,.xls,.csv" hidden onchange="lerArquivo(this.files[0])">
    </div>
    <div id="imp-resumo"></div>`;
}
async function lerArquivo(file){
  if(!file) return;
  try{
    const wb = XLSX.read(new Uint8Array(await file.arrayBuffer()), {type:'array'});
    const acha = (nome)=>{ const n = wb.SheetNames.find(s=>s.trim().toUpperCase()===nome); return n? wb.Sheets[n] : null; };
    let wsInst = acha('INSTITUCIONAL'), wsForm = acha('FORM'), wsAcc = acha('ACESSOS');
    if(!wsInst && wb.SheetNames.length===1){
      const unica = wb.Sheets[wb.SheetNames[0]];
      const teste = normLinhas(unica)[0]||{};
      if('REGISTRO' in teste && 'NOME' in teste) wsInst = unica;
    }
    const membros = !wsInst ? [] : normLinhas(wsInst).map(r=>{
      const o={};
      Object.entries(MAPA_INST).forEach(([h,k])=>{
        const v=r[h];
        if(k==='registro') o[k] = v==null||v===''? null : Math.round(Number(v));
        else if(k==='grupos') o[k] = t(v)? String(v).split(',').map(x=>x.trim()).filter(Boolean) : [];
        else if(k.startsWith('data_')) o[k] = dataISO(v);
        else o[k] = t(v);
      });
      if(!o.status) o.status='Ativo';
      return o;
    }).filter(o=>o.registro && o.nome);
    const pess = !wsForm ? [] : normLinhas(wsForm).map(r=>{
      const o={_nome: t(r['NOME COMPLETO'])};
      Object.entries(MAPA_FORM).forEach(([h,k])=>{
        const v=r[h];
        if(k==='data_nascimento') o[k]=dataISO(v);
        else if(k==='matricula') o[k]=textoNum(v);
        else o[k]=t(v);
      });
      const term = t(r['TERMO DE AUTORIZAÇÃO DO USO DE IMAGEM']);
      o.autorizacao_imagem = term ? term.toLowerCase().startsWith('autorizo') : null;
      return o;
    }).filter(o=>o._nome);
    const acessos = [];
    if(wsAcc) normLinhas(wsAcc).forEach(r=>{
      const nome = t(r['NOME']); if(!nome) return;
      Object.entries(MAPA_ACESSOS).forEach(([h,item])=>{ if(ehVerdade(r[h])) acessos.push({_nome:nome, _item:item}); });
    });
    if(!membros.length && !pess.length && !acessos.length){
      toast('Não encontrei as abas esperadas nesse arquivo. Confira se é a planilha NRO-PES-005.', true); return;
    }
    pacote = {membros, pess, acessos};
    $('#imp-resumo').innerHTML = `<div class="card"><h3>Pronto para importar — ${esc(file.name)}</h3>
      <label class="check"><input type="checkbox" id="ck-m" ${membros.length?'checked':'disabled'}>
        <span><b>${membros.length}</b> membros (aba INSTITUCIONAL)</span></label>
      <label class="check"><input type="checkbox" id="ck-p" ${pess.length?'checked':'disabled'}>
        <span><b>${pess.length}</b> fichas de dados pessoais (aba FORM)</span></label>
      <label class="check"><input type="checkbox" id="ck-a" ${acessos.length?'checked':'disabled'}>
        <span><b>${acessos.length}</b> concessões de acesso marcadas (aba ACESSOS)</span></label>
      <div style="display:flex;gap:10px;margin-top:14px">
        <button class="btn btn-primary" id="imp-go" onclick="executarImport()">${ic('upload')} Importar agora</button>
        <button class="btn" onclick="renderImportar()">Escolher outro arquivo</button></div>
      <div id="imp-log" class="log" style="margin-top:16px" hidden></div></div>`;
  }catch(e){ falha(e,'Não consegui ler o arquivo'); }
}
async function executarImport(){
  if(!pacote) return;
  const log = $('#imp-log'); log.hidden=false; log.textContent='';
  const diz = (s)=>{ log.textContent += s+'\n'; log.scrollTop = log.scrollHeight; };
  $('#imp-go').disabled = true;
  try{
    if($('#ck-m').checked && pacote.membros.length){
      diz(`Importando ${pacote.membros.length} membros…`);
      await upsertLotes('membros', pacote.membros, 'registro');
      const {data} = await db.from('membros').select('*').order('registro');
      state.membros = data||[];
      diz(`✔ Membros importados. O quadro agora tem ${state.membros.length} registros.`);
    }
    const porNome = new Map(state.membros.map(m=>[norm(m.nome), m.registro]));
    if($('#ck-p').checked && pacote.pess.length){
      const linhas=[], semPar=[];
      pacote.pess.forEach(p=>{
        const reg = porNome.get(norm(p._nome));
        if(!reg){ semPar.push(p._nome); return; }
        const {_nome, ...resto} = p; linhas.push({registro:reg, ...resto});
      });
      diz(`Importando ${linhas.length} fichas de dados pessoais…`);
      await upsertLotes('dados_pessoais', linhas, 'registro');
      diz(`✔ Dados pessoais importados.`);
      if(semPar.length) diz(`⚠ ${semPar.length} resposta(s) do FORM sem membro correspondente: ${semPar.join('; ')}`);
    }
    if($('#ck-a').checked && pacote.acessos.length){
      const porItem = new Map(state.itens.map(i=>[i.nome, i.id]));
      const linhas=[]; let semMembro=0, semItem=0;
      pacote.acessos.forEach(a=>{
        const reg = porNome.get(norm(a._nome)); if(!reg){ semMembro++; return; }
        const item = porItem.get(a._item); if(!item){ semItem++; return; }
        linhas.push({registro:reg, item_id:item, ativo:true, responsavel:'Importação da planilha'});
      });
      diz(`Importando ${linhas.length} concessões de acesso…`);
      await upsertLotes('acessos_concedidos', linhas, 'registro,item_id');
      diz(`✔ Acessos importados.`);
      if(semMembro) diz(`⚠ ${semMembro} concessão(ões) ignorada(s): nome sem membro correspondente.`);
      if(semItem) diz(`⚠ ${semItem} concessão(ões) ignorada(s): item fora do catálogo.`);
    }
    diz('');
    diz('Importação concluída. Confira o quadro na aba Membros.');
    toast('Importação concluída.');
  }catch(e){ diz('✖ ERRO: '+(e?.message||e)); falha(e,'A importação foi interrompida'); }
  $('#imp-go').disabled = false;
}

init();
</script>
</body>
