    <div class="field"><label>Texto</label><textarea id="ps-pb-corpo" style="min-height:130px" placeholder="Texto exibido no site (opcional para resultados: a lista é automática).">${esc(p?.corpo||'')}</textarea></div>
    <div class="field"><label>Link do documento (PDF do edital etc.)</label><input id="ps-pb-anexo" value="${esc(p?.url_anexo||'')}" placeholder="https://…"></div>
    <p class="small muted">Para tipos de resultado, a lista de nomes é montada a partir do status dos candidatos. Faça as movimentações antes de publicar.</p>
    <div class="actions">
      <button class="btn" onclick="fechaModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="psSalvarPub(${p?`'${p.id}'`:'null'})">${ic('check')} Salvar</button>
    </div>`);
}
async function psSalvarPub(id){
  const linha = { tipo:$('#ps-pb-tipo').value, titulo:$('#ps-pb-titulo').value.trim(),
    corpo:$('#ps-pb-corpo').value.trim()||null, url_anexo:$('#ps-pb-anexo').value.trim()||null };
  if(!linha.titulo){ toast('Dê um título à publicação.', true); return; }
  try{
    const q = id ? db.from('ps_publicacoes').update(linha).eq('id', id)
                 : db.from('ps_publicacoes').insert({...linha, edicao_id:PS.ed.id, criado_por:quemSouEu()});
    const {error} = await q;
    if(error) throw error;
    toast('Publicação salva.'); fechaModal();
    PS.pronto=false; renderSelecao();
  }catch(e){ falha(e,'Falha ao salvar publicação'); }
}
async function psPublicar(id, publicar){
  const p = PS.pubs.find(x=>x.id===id);
  const setPub = PS_SETS[p.tipo];
  const qtd = setPub ? PS.candidatos.filter(c=>setPub.includes(c.status)).length : null;
  if(publicar && !await confirma(`Publicar "<b>${esc(p.titulo)}</b>"?<br><span class="small muted">
    Ela aparece imediatamente no site${qtd!=null?` com <b>${qtd}</b> nome(s) na lista, e libera essa fase do resultado para os candidatos`:''}.</span>`,'Publicar')) return;
  try{
    const {error} = await db.from('ps_publicacoes')
      .update({publicado:publicar, publicado_em: publicar?new Date().toISOString():null}).eq('id', id);
    if(error) throw error;
    toast(publicar?'Publicado no site. 📣':'Removido do site.');
    PS.pronto=false; renderSelecao();
  }catch(e){ falha(e,'Falha ao publicar'); }
}
async function psExcluirPub(id){
  if(!await confirma('Excluir esta publicação?','Excluir')) return;
  try{
    const {error} = await db.from('ps_publicacoes').delete().eq('id', id);
    if(error) throw error;
    toast('Publicação excluída.');
    PS.pronto=false; renderSelecao();
  }catch(e){ falha(e,'Falha ao excluir'); }
}

/* ---------- Seleção · configurações ---------- */
function psConfig(){
  const e = PS.ed;
  const souAdmin = state.perfil.papel==='admin';
  const comite = PS.perfis.filter(p=>p.papel==='selecao');
  const promoviveis = PS.perfis.filter(p=>p.papel==='leitura');
  $('#sel-corpo').innerHTML = `
  <div class="card">
    <h3>Edição</h3>
    <div class="form-grid">
      <div class="field full"><label>Nome</label><input id="ps-ed-nome" value="${esc(e.nome)}"></div>
      <div class="field full"><label>Descrição (aparece no site)</label><textarea id="ps-ed-desc">${esc(e.descricao||'')}</textarea></div>
      <div class="field"><label>Início das inscrições</label><input id="ps-ed-ini" type="date" value="${e.inscricoes_inicio}"></div>
      <div class="field"><label>Fim das inscrições</label><input id="ps-ed-fim" type="date" value="${e.inscricoes_fim}"></div>
      <div class="field"><label>Status</label><select id="ps-ed-status">
        ${['rascunho','publicada','encerrada'].map(s=>`<option ${e.status===s?'selected':''}>${s}</option>`).join('')}</select></div>
      <div class="field"><label>URL do edital (PDF)</label><input id="ps-ed-edital" value="${esc(e.edital_url||'')}" placeholder="https://…"></div>
      <div class="field full"><label>Áreas do formulário (separadas por vírgula)</label>
        <input id="ps-ed-areas" value="${esc((e.areas||[]).join(', '))}"></div>
    </div>
    <p class="small muted" style="margin-bottom:10px">O site mostra a edição <b>publicada</b> mais recente. "Rascunho" fica invisível ao público; "encerrada" tira a edição do ar.</p>
    <button class="btn btn-primary" onclick="psSalvarEdicao()">${ic('check')} Salvar edição</button>
    <button class="btn" onclick="psNovaEdicao()" style="margin-left:8px">${ic('plus')} Nova edição</button>
  </div>
  <div class="card">
    <h3>Cronograma público</h3>
    <table class="tb"><thead><tr><th>Ordem</th><th>Marco</th><th>Período</th><th>Fase</th><th></th></tr></thead><tbody>
      ${PS.etapas.map(t=>`<tr>
        <td class="reg">${t.ordem}</td><td><b>${esc(t.titulo)}</b></td>
        <td class="small">${fmtD(t.data_inicio)}${t.data_fim&&t.data_fim!==t.data_inicio?' a '+fmtD(t.data_fim):''}</td>
        <td><span class="chip">${esc(t.fase)}</span></td>
        <td style="text-align:right;white-space:nowrap">
          ${ibtn('pencil','Editar',`psEditarEtapa('${t.id}')`,'sm ghost')}
          ${ibtn('trash','Excluir',`psExcluirEtapa('${t.id}')`,'sm ghost')}</td>
      </tr>`).join('') || '<tr><td colspan="5"><div class="empty">Nenhum marco cadastrado.</div></td></tr>'}
    </tbody></table>
    <div style="margin-top:12px"><button class="btn" onclick="psEditarEtapa()">${ic('plus')} Adicionar marco</button></div>
  </div>
  <div class="card">
    <h3>Acesso ao módulo (Comitê de Seleção)</h3>
    <p class="small muted" style="margin:-8px 0 12px">Quem tiver o papel <b>selecao</b> acessa esta página por completo, mantendo apenas consulta no restante do SOMA. Administração e Depto de Pessoal sempre têm acesso.${souAdmin?'':' <b>Somente administradores alteram papéis.</b>'}</p>
    ${can() ? (comite.map(p=>`<div class="bar-row">
        <span class="avatar" style="width:28px;height:28px">${esc(iniciais(p.nome||p.email))}</span>
        <span style="flex:1"><b>${esc(p.nome||p.email)}</b> <span class="muted small">${esc(p.email)}</span></span>
        ${souAdmin?ibtn('x','Remover do comitê',`psTirarAcesso('${p.id}')`,'sm ghost'):''}</div>`).join('')
      || '<div class="empty" style="padding:16px">Ninguém com o papel selecao ainda. Apenas admin/pessoal acessam por enquanto.</div>')
    : '<div class="empty" style="padding:16px">A lista de perfis é visível apenas para admin/pessoal.</div>'}
    ${souAdmin?`<div style="display:flex;gap:10px;margin-top:12px;flex-wrap:wrap">
      <select id="ps-com-add" style="flex:1;min-width:240px">
        <option value="">Escolher perfil…</option>
        ${promoviveis.map(p=>`<option value="${p.id}">${esc(p.nome||p.email)} (${esc(p.email)})</option>`).join('')}
      </select>
      <button class="btn btn-primary" onclick="psDarAcesso()">${ic('plus')} Incluir no comitê</button></div>
      <p class="small muted" style="margin-top:8px">A pessoa precisa ter uma conta no SOMA (perfil criado no primeiro login). Contas admin/pessoal não aparecem aqui porque já têm acesso.</p>`:''}
  </div>`;
}
async function psSalvarEdicao(){
  const linha = { nome:$('#ps-ed-nome').value.trim(), descricao:$('#ps-ed-desc').value.trim()||null,
    inscricoes_inicio:$('#ps-ed-ini').value, inscricoes_fim:$('#ps-ed-fim').value,
    status:$('#ps-ed-status').value, edital_url:$('#ps-ed-edital').value.trim()||null,
    areas: $('#ps-ed-areas').value.split(',').map(s=>s.trim()).filter(Boolean) };
  if(!linha.nome||!linha.inscricoes_inicio||!linha.inscricoes_fim){ toast('Preencha nome e período de inscrições.', true); return; }
  try{
    const {error} = await db.from('ps_edicoes').update(linha).eq('id', PS.ed.id);
    if(error) throw error;
    toast('Edição salva.');
    PS.pronto=false; renderSelecao();
  }catch(e){ falha(e,'Falha ao salvar edição'); }
}
function psNovaEdicao(){
  abreModal(`<h3>Nova edição</h3>
    <div class="field"><label>Nome</label><input id="ps-ne-nome" placeholder="Processo Seletivo 2027"></div>
    <div class="field"><label>Identificador (slug)</label><input id="ps-ne-slug" placeholder="ps-2027"></div>
    <div class="form-grid">
      <div class="field"><label>Início das inscrições</label><input id="ps-ne-ini" type="date"></div>
      <div class="field"><label>Fim das inscrições</label><input id="ps-ne-fim" type="date"></div>
    </div>
    <p class="small muted">A edição nasce como <b>rascunho</b>. Publique-a nas configurações quando estiver pronta.</p>
    <div class="actions"><button class="btn" onclick="fechaModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="psCriarEdicao()">${ic('check')} Criar</button></div>`, true);
}
async function psCriarEdicao(){
  const nome=$('#ps-ne-nome').value.trim(), slug=$('#ps-ne-slug').value.trim().toLowerCase();
  const ini=$('#ps-ne-ini').value, fim=$('#ps-ne-fim').value;
  if(!nome||!slug||!ini||!fim){ toast('Preencha todos os campos.', true); return; }
  try{
    const {data, error} = await db.from('ps_edicoes')
      .insert({nome, slug, inscricoes_inicio:ini, inscricoes_fim:fim, areas:PS.ed?.areas||[]})
      .select().single();
    if(error) throw error;
    toast('Edição criada.'); fechaModal();
    PS.ed = data; PS.pronto=false; PS.tab='config';
    renderSelecao();
  }catch(e){ falha(e,'Falha ao criar edição'); }
}
function psEditarEtapa(id){
  const t = id ? PS.etapas.find(x=>x.id===id) : null;
  abreModal(`<h3>${t?'Editar marco':'Novo marco do cronograma'}</h3>
    <div class="field"><label>Título</label><input id="ps-et-titulo" value="${esc(t?.titulo||'')}"></div>
    <div class="form-grid">
      <div class="field"><label>Data de início</label><input id="ps-et-ini" type="date" value="${t?.data_inicio||''}"></div>
      <div class="field"><label>Data de fim (opcional)</label><input id="ps-et-fim" type="date" value="${t?.data_fim||''}"></div>
      <div class="field"><label>Fase</label><select id="ps-et-fase">
        ${PS_FASES_ETAPA.map(f=>`<option ${t?.fase===f?'selected':''}>${f}</option>`).join('')}</select></div>
      <div class="field"><label>Ordem</label><input id="ps-et-ordem" type="number" value="${t?.ordem??(Math.max(0,...PS.etapas.map(x=>x.ordem))+10)}"></div>
    </div>
    <div class="field"><label>Descrição (opcional, aparece no site)</label><textarea id="ps-et-desc">${esc(t?.descricao||'')}</textarea></div>
    <div class="actions"><button class="btn" onclick="fechaModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="psSalvarEtapa(${t?`'${t.id}'`:'null'})">${ic('check')} Salvar</button></div>`);
}
async function psSalvarEtapa(id){
  const linha = { titulo:$('#ps-et-titulo').value.trim(), data_inicio:$('#ps-et-ini').value,
    data_fim:$('#ps-et-fim').value||null, fase:$('#ps-et-fase').value,
    ordem:parseInt($('#ps-et-ordem').value,10)||100, descricao:$('#ps-et-desc').value.trim()||null };
  if(!linha.titulo||!linha.data_inicio){ toast('Preencha título e data.', true); return; }
  try{
    const q = id ? db.from('ps_etapas').update(linha).eq('id', id)
                 : db.from('ps_etapas').insert({...linha, edicao_id:PS.ed.id});
    const {error} = await q;
    if(error) throw error;
    toast('Cronograma atualizado.'); fechaModal();
    PS.pronto=false; renderSelecao();
  }catch(e){ falha(e,'Falha ao salvar marco'); }
}
async function psExcluirEtapa(id){
  if(!await confirma('Excluir este marco do cronograma?','Excluir')) return;
  try{
    const {error} = await db.from('ps_etapas').delete().eq('id', id);
    if(error) throw error;
    toast('Marco excluído.');
    PS.pronto=false; renderSelecao();
  }catch(e){ falha(e,'Falha ao excluir'); }
}
async function psDarAcesso(){
  const uid = $('#ps-com-add').value;
  if(!uid){ toast('Escolha um perfil.', true); return; }
  try{
    const {error} = await db.from('perfis').update({papel:'selecao'}).eq('id', uid);
    if(error) throw error;
    toast('Acesso concedido ao comitê.');
    PS.pronto=false; renderSelecao();
  }catch(e){ falha(e,'Falha ao conceder acesso'); }
}
async function psTirarAcesso(uid){
  if(!await confirma('Remover esta pessoa do comitê? O perfil volta ao papel de consulta.','Remover')) return;
  try{
    const {error} = await db.from('perfis').update({papel:'leitura'}).eq('id', uid);
    if(error) throw error;
    toast('Removido do comitê.');
    PS.pronto=false; renderSelecao();
  }catch(e){ falha(e,'Falha ao remover'); }
}

init();
</script>
</body>
</html>
