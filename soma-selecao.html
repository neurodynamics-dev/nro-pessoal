<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>SOMA · Seleção — NeuroDynamics</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%231D1D1F'/%3E%3Ccircle cx='11' cy='16' r='5' fill='%23F5F5F7'/%3E%3Ccircle cx='23' cy='9.5' r='2.8' fill='%23F5F5F7'/%3E%3Ccircle cx='23' cy='22.5' r='2.8' fill='%23F5F5F7'/%3E%3Cpath d='M15 13.8 20.6 10.6M15 18.2 20.6 21.4' stroke='%23CEDC00' stroke-width='1.7' stroke-linecap='round'/%3E%3C/svg%3E">
<style>
:root{
  --bg:#F5F5F7; --panel:#FFFFFF; --ink:#1D1D1F; --muted:#6E6E73; --soft:#F0F0F2;
  --line:#E8E8ED; --line2:#D2D2D7; --green:#00594F; --deep:#00352F; --syn:#CEDC00;
  --ok:#1F8A5B; --bad:#C0392B; --warn:#B7791F; --info:#4C6FBF; --gray:#8E8E93;
  --r:12px; --sh:0 1px 2px rgba(0,0,0,.05);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,Helvetica,sans-serif;
  font-size:14px;color:var(--ink);background:var(--bg);-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;color:inherit}
input,select,textarea{font-family:inherit;font-size:14px;color:var(--ink)}
a{color:var(--green);text-decoration:none}
a:hover{text-decoration:underline}
[hidden]{display:none!important}
.ic{width:19px;height:19px;flex-shrink:0}
.logo-mark{display:block}

/* ============ LOGIN ============ */
#login-view{position:fixed;inset:0;display:flex;background:#0C0C0D;color:#F5F5F7;z-index:10;
  background-image:linear-gradient(rgba(245,245,247,.045) 1px,transparent 1px),linear-gradient(90deg,rgba(245,245,247,.045) 1px,transparent 1px);
  background-size:120px 120px}
.lg-left{flex:1;position:relative;min-width:0}
.lg-logo{position:absolute;top:30px;left:34px;display:flex;align-items:center;gap:11px;color:#F5F5F7}
.lg-logo .logo-mark{height:26px;width:auto;filter:brightness(0) invert(1)}
.lg-modulo{position:absolute;top:70px;left:34px;font-size:11px;font-weight:700;letter-spacing:.16em;
  text-transform:uppercase;color:var(--syn)}
.lg-rodape{position:absolute;bottom:22px;left:34px;right:34px;font-size:11.5px;color:#98989D;letter-spacing:.02em}
.lg-panel{width:min(430px,100%);background:#1D1D1F;padding:60px 48px;display:flex;flex-direction:column;justify-content:center}
.lg-panel h1{font-size:38px;font-weight:600;letter-spacing:-.5px;margin-bottom:42px;color:#F5F5F7}
.lg-field{margin-bottom:26px}
.lg-field label{display:block;font-size:10.5px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:#98989D;margin-bottom:7px}
.lg-field input{width:100%;background:transparent;border:none;border-bottom:1px solid #77777C;color:#F5F5F7;
  padding:7px 2px;font-size:15px;border-radius:0}
.lg-field input:focus{outline:none;border-bottom-color:var(--syn)}
.lg-go{align-self:flex-end;margin-top:34px;width:38px;height:38px;border-radius:11px;border:none;background:#F5F5F7;
  color:#1D1D1F;display:flex;align-items:center;justify-content:center;transition:transform .15s}
.lg-go:hover{transform:scale(1.05)}
.lg-go:disabled{opacity:.5;transform:none;cursor:default}
.lg-err{background:rgba(192,57,43,.16);border:1px solid rgba(192,57,43,.4);color:#F1A9A0;
  border-radius:10px;padding:10px 13px;font-size:12.5px;margin-bottom:20px;line-height:1.5}
@media (max-width:760px){ .lg-left{display:none} .lg-panel{width:100%} #login-view{background-image:none} }

/* ============ ESTRUTURA ============ */
#app{display:flex;min-height:100vh}
.sidebar{width:230px;flex-shrink:0;background:var(--panel);border-right:1px solid var(--line);
  display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow:hidden}
.sb-top{display:flex;flex-direction:column;gap:4px;padding:16px 14px 12px}
.sb-brand{display:flex;align-items:center;min-width:0}
.sb-brand .logo-mark{height:22px;width:auto;max-width:150px}
.sb-mod{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--green);margin-top:5px}
.sb-nav{flex:1;padding:6px;overflow-y:auto;overflow-x:hidden}
.sb-nav button{display:flex;align-items:center;gap:11px;width:100%;background:none;border:none;text-align:left;
  padding:10px 12px;font-size:13.5px;font-weight:500;color:#48484A;border-radius:10px;margin-bottom:2px;white-space:nowrap}
.sb-nav button .ic{color:#7C7C80}
.sb-nav button:hover{background:var(--soft)}
.sb-nav button.active{background:var(--soft);color:var(--green);font-weight:600}
.sb-nav button.active .ic{color:var(--green)}
.sb-user{padding:12px;border-top:1px solid var(--line);display:flex;align-items:center;gap:10px}
.sb-user .avatar{width:32px;height:32px;flex-shrink:0}
.sb-user .info{min-width:0;flex:1}
.sb-user .nm{font-size:12.5px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-user .rl{font-size:11px;color:var(--muted);white-space:nowrap}
main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:5;background:rgba(245,245,247,.82);backdrop-filter:blur(14px) saturate(1.6);
  -webkit-backdrop-filter:blur(14px) saturate(1.6);border-bottom:1px solid var(--line);
  padding:12px 26px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.topbar h1{font-size:17px;font-weight:600;letter-spacing:-.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar .tacts{display:flex;align-items:center;gap:8px}
.content{padding:24px 26px 70px;max-width:1220px;width:100%}

/* ============ COMPONENTES ============ */
.icon-btn{width:38px;height:38px;border-radius:11px;border:1px solid var(--line);background:var(--panel);
  display:inline-flex;align-items:center;justify-content:center;color:#48484A;flex-shrink:0;box-shadow:var(--sh)}
.icon-btn:hover{border-color:var(--line2);background:#FAFAFA}
.icon-btn.ghost{border-color:transparent;background:transparent;box-shadow:none}
.icon-btn.ghost:hover{background:var(--soft)}
.icon-btn.sm{width:32px;height:32px;border-radius:9px}
.icon-btn.sm .ic{width:16px;height:16px}
.btn{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--line);background:var(--panel);
  border-radius:10px;padding:8px 15px;font-size:13.5px;font-weight:600;color:var(--ink);box-shadow:var(--sh)}
.btn:hover{border-color:var(--line2);background:#FAFAFA}
.btn-primary{background:var(--deep);border-color:var(--deep);color:#fff}
.btn-primary:hover{background:var(--green);border-color:var(--green)}
.btn-danger{color:var(--bad)}
.btn:disabled{opacity:.5;cursor:default}
.btn .ic{width:16px;height:16px}
.btn.sm{padding:5px 11px;font-size:12px;border-radius:8px}
.avatar{border-radius:50%;background:var(--soft);color:var(--green);display:inline-flex;align-items:center;
  justify-content:center;font-weight:700;font-size:12px;letter-spacing:.02em}
.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:20px;margin-bottom:16px;box-shadow:var(--sh)}
.card h3{font-size:14.5px;font-weight:600;letter-spacing:-.1px;margin-bottom:14px}
.grid-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:13px;margin-bottom:16px}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px 18px;box-shadow:var(--sh)}
.stat .n{font-size:27px;font-weight:700;letter-spacing:-.6px}
.stat .l{font-size:12px;color:var(--muted);margin-top:2px}
.stat.destaque{border-color:#BFD0CC}
.stat.destaque .n{color:var(--green)}
.pill{display:inline-flex;align-items:center;gap:6px;background:var(--soft);border-radius:999px;
  padding:3.5px 11px;font-size:11.5px;font-weight:600;color:#3A3A3C;white-space:nowrap}
.pill .dt{width:7px;height:7px;border-radius:50%;background:var(--gray);flex-shrink:0}
.dt-ok{background:var(--ok)!important}.dt-warn{background:var(--warn)!important}
.dt-info{background:var(--info)!important}.dt-bad{background:var(--bad)!important}.dt-gray{background:var(--gray)!important}
.chip{display:inline-block;background:var(--soft);border-radius:7px;padding:2.5px 8px;font-size:11px;
  color:#48484A;margin:1px 3px 1px 0;font-weight:500}
.reg{font-variant-numeric:tabular-nums;font-weight:600;color:var(--muted);font-size:12.5px}
table.tb{width:100%;border-collapse:collapse}
.tb th{text-align:left;font-size:10.5px;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);
  padding:8px 10px;border-bottom:1px solid var(--line);font-weight:600}
.tb td{padding:10.5px 10px;border-bottom:1px solid #F1F1F4;vertical-align:middle}
.tb tr:last-child td{border-bottom:none}
.tb tbody tr.click{cursor:pointer}
.tb tbody tr.click:hover{background:#FAFAFB}
.field{margin-bottom:13px;min-width:0}
.field label{display:block;font-size:11.5px;font-weight:600;color:#48484A;margin-bottom:5px}
.field input,.field select,.field textarea{width:100%;border:1px solid var(--line2);border-radius:10px;
  padding:8.5px 11px;background:#fff}
.field textarea{min-height:82px;resize:vertical}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--green);
  box-shadow:0 0 0 3px rgba(0,89,79,.14)}
.check{display:flex;align-items:center;gap:9px;font-size:13.5px;padding:6px 2px;cursor:pointer}
.check input{width:16px;height:16px;accent-color:var(--green);flex-shrink:0;cursor:pointer}
.filters{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;margin-bottom:14px}
.filters .field{margin:0;min-width:140px}
.filters .field.grow{flex:1;min-width:200px}
.muted{color:var(--muted)}
.small{font-size:12.5px}
.empty{padding:32px;text-align:center;color:var(--muted);font-size:13.5px;line-height:1.6}
.banner{border-radius:12px;padding:12px 15px;font-size:13px;margin-bottom:14px;line-height:1.55;border:1px solid}
.banner.red{background:#FBF1F0;border-color:#EBC8C3;color:#8E2F23}
.banner.amber{background:#FBF5EA;border-color:#EAD7B3;color:#7A5311}
.banner.neutral{background:var(--soft);border-color:var(--line);color:#48484A}
.banner.lima{background:#F7FAE0;border-color:#DDE6A3;color:#4A5310}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:13px}
.bar-row .lb{width:170px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-row .tr{flex:1;background:var(--soft);border-radius:5px;height:8px;overflow:hidden}
.bar-row .fl{height:100%;background:var(--green);border-radius:5px}
.bar-row .vl{width:36px;text-align:right;font-weight:600}
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--line);margin-bottom:18px;flex-wrap:wrap}
.tabs button{background:none;border:none;padding:9px 14px;font-size:13.5px;font-weight:600;color:var(--muted);
  border-bottom:2px solid transparent;margin-bottom:-1px}
.tabs button.active{color:var(--ink);border-bottom-color:var(--green)}
.dl{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px 24px}
.dl .it dt{font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:3px;font-weight:600}
.dl .it dd{font-size:13.5px;word-break:break-word}
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:11px 15px}
.form-grid .full{grid-column:1/-1}
.overlay{position:fixed;inset:0;background:rgba(29,29,31,.4);display:flex;align-items:flex-start;
  justify-content:center;padding:6vh 16px;z-index:50;overflow-y:auto;backdrop-filter:blur(3px)}
.modal{background:#fff;border-radius:16px;width:100%;max-width:680px;padding:24px;box-shadow:0 18px 50px rgba(0,0,0,.18)}
.modal h3{font-size:16.5px;font-weight:600;letter-spacing:-.2px;margin-bottom:16px}
.modal .actions{display:flex;justify-content:flex-end;gap:10px;margin-top:20px}
.modal.narrow{max-width:430px}
.modal.larga{max-width:840px}
#toast{position:fixed;bottom:22px;right:22px;z-index:99;display:flex;flex-direction:column;gap:8px}
.toast{background:#1D1D1F;color:#F5F5F7;border-radius:11px;padding:11px 16px;font-size:13px;max-width:360px;
  box-shadow:0 8px 24px rgba(0,0,0,.25)}
.toast.err{background:#3A1D1A;color:#F1A9A0}
@media (max-width:860px){
  #app{flex-direction:column}
  .sidebar{width:100%;height:auto;position:static}
  .sb-nav{display:flex;flex-wrap:wrap;padding:4px 8px}
  .sb-nav button{width:auto;padding:8px 11px}
  .content,.topbar{padding-left:15px;padding-right:15px}
}

/* ============ ESPECÍFICOS DO MÓDULO ============ */
.sel-bar{position:sticky;bottom:14px;z-index:6;display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  background:#1D1D1F;color:#F5F5F7;border-radius:14px;padding:10px 16px;box-shadow:0 10px 30px rgba(0,0,0,.3);margin-top:14px}
.sel-bar .qt{font-weight:700;font-size:13px;margin-right:4px}
.sel-bar select{background:#2C2C2E;color:#F5F5F7;border:1px solid #48484A;border-radius:9px;padding:7px 10px;font-size:12.5px}
.sel-bar .btn{background:var(--syn);border-color:var(--syn);color:var(--deep);box-shadow:none}
.sel-bar .linkzim{background:none;border:none;color:#98989D;font-size:12px;text-decoration:underline}
.fase-chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.fase-chips button{border:1px solid var(--line2);background:#fff;border-radius:999px;padding:7px 15px;
  font-size:12.5px;font-weight:600;color:var(--muted)}
.fase-chips button.on{background:var(--deep);border-color:var(--deep);color:#fff}
.aval-cand{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;
  border:1px solid var(--line);border-radius:12px;padding:13px 16px;margin-bottom:10px}
.aval-cand .nm{font-weight:600;font-size:13.5px}
.aval-cand .mt{font-size:12px;color:var(--muted)}
.nota-badge{display:inline-flex;align-items:center;gap:5px;background:var(--soft);border-radius:8px;
  padding:3px 10px;font-size:12px;font-weight:700;font-variant-numeric:tabular-nums}
.crit-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:9px 0;
  border-bottom:1px solid #F1F1F4;flex-wrap:wrap}
.crit-row .lb{font-size:13.5px;font-weight:500}
.seg15{display:inline-flex;border:1px solid var(--line2);border-radius:10px;overflow:hidden;background:#fff}
.seg15 button{border:none;background:transparent;width:40px;padding:8px 0;font-size:13px;font-weight:600;color:var(--muted);
  border-right:1px solid var(--line)}
.seg15 button:last-child{border-right:none}
.seg15 button.on{background:var(--deep);color:#fff}
.rec-seg{display:flex;gap:8px;flex-wrap:wrap}
.rec-seg button{flex:1;min-width:110px;border:1px solid var(--line2);background:#fff;border-radius:10px;
  padding:9px 8px;font-size:12.5px;font-weight:600;color:var(--muted)}
.rec-seg button.on-ap{background:#E7F4EE;border-color:var(--ok);color:var(--ok)}
.rec-seg button.on-du{background:#FBF3E3;border-color:var(--warn);color:var(--warn)}
.rec-seg button.on-re{background:#FBEBE9;border-color:var(--bad);color:var(--bad)}
.slot-dia{margin-bottom:18px}
.slot-dia h4{font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.slot-chips{display:flex;gap:9px;flex-wrap:wrap}
.slot-chip{border:1px solid var(--line2);background:#fff;border-radius:11px;padding:9px 13px;text-align:left;
  min-width:130px;box-shadow:var(--sh)}
.slot-chip:hover{border-color:var(--green)}
.slot-chip .h{font-weight:700;font-size:13.5px;font-variant-numeric:tabular-nums}
.slot-chip .o{font-size:11.5px;color:var(--muted);margin-top:2px}
.slot-chip.cheio{background:#F7FAE0;border-color:#DDE6A3}
.slot-chip.inativo{opacity:.5}
.pub-row{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;
  border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:10px}
.pub-row .tt{font-weight:600;font-size:13.5px}
.pub-row .mt{font-size:12px;color:var(--muted)}
.badge-pub{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;border-radius:999px;padding:3px 10px}
.badge-pub.sim{background:#E7F4EE;color:var(--ok)}
.badge-pub.nao{background:var(--soft);color:var(--muted)}
</style>
</head>
<body>

<!-- ==================== LOGIN ==================== -->
<div id="login-view">
  <div class="lg-left">
    <div class="lg-logo"><span class="logo-slot"></span></div>
    <div class="lg-modulo">Módulo Seleção</div>
    <div class="lg-rodape">SOMA · Sistema de Operações, Membros e Atividades — NeuroDynamics 2026</div>
  </div>
  <div class="lg-panel">
    <h1>Seleção</h1>
    <div id="login-err" class="lg-err" hidden></div>
    <div class="lg-field"><label for="login-email">E-mail</label>
      <input id="login-email" type="email" autocomplete="username"></div>
    <div class="lg-field"><label for="login-pass">Senha</label>
      <input id="login-pass" type="password" autocomplete="current-password"></div>
    <button id="login-btn" class="lg-go" onclick="fazerLogin()" title="Entrar" aria-label="Entrar"></button>
  </div>
</div>

<!-- ==================== APLICAÇÃO ==================== -->
<div id="app" hidden>
  <aside class="sidebar">
    <div class="sb-top">
      <div class="sb-brand"><span class="logo-slot"></span></div>
      <div class="sb-mod">Seleção · Processo Seletivo</div>
    </div>
    <nav class="sb-nav" id="nav"></nav>
    <div class="sb-user">
      <span class="avatar" id="user-avatar">—</span>
      <span class="info"><span class="nm" id="user-nome">—</span><br><span class="rl" id="user-papel">—</span></span>
      <button class="icon-btn ghost sm" onclick="sair()" title="Sair" id="btn-sair"></button>
    </div>
  </aside>
  <main>
    <div class="topbar">
      <h1 id="page-title">Visão geral</h1>
      <div class="tacts" id="page-actions"></div>
    </div>
    <div class="content" id="content"></div>
  </main>
</div>

<div id="modal-root"></div>
<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>

const SITE_PS = 'https://selecao.neurodynamics.dev';

/* ---------------- utilidades ---------------- */
const $ = s=>document.querySelector(s);
const esc = v=> v==null ? '' : String(v).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmtD = d=>{ if(!d) return '—'; const [a,m,dd]=String(d).slice(0,10).split('-'); return `${dd}/${m}/${a}`; };
const fmtDT = d=>{ if(!d) return '—'; const x=new Date(d); return x.toLocaleDateString('pt-BR')+' '+x.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}); };
const hoje = ()=>{ const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };
const iniciais = n=> String(n||'?').trim().split(/\s+/).map(p=>p[0]).filter(Boolean).slice(0,2).join('').toUpperCase();
const pill = st=>{ const [l,d]=ST[st]||[st,'dt-gray']; return `<span class="pill"><span class="dt ${d}"></span>${esc(l)}</span>`; };
const hm = t=> t ? String(t).slice(0,5) : '';
const quemSouEu = ()=> state.perfil ? (state.perfil.nome || state.perfil.email) : '';
function toast(msg, err){ const t=document.createElement('div'); t.className='toast'+(err?' err':''); t.textContent=msg;
  $('#toast').appendChild(t); setTimeout(()=>t.remove(), 4200); }
function falha(e, ctx){ console.error(ctx, e); toast((ctx?ctx+': ':'')+(e?.message||'erro inesperado'), true); }
function fechaModal(){ $('#modal-root').innerHTML=''; }
function abreModal(html, cls){ $('#modal-root').innerHTML =
  `<div class="overlay" onclick="if(event.target===this) fechaModal()"><div class="modal ${cls||''}">${html}</div></div>`; }
function confirma(msg, okLabel){ return new Promise(res=>{ abreModal(`<h3>Confirmar</h3><p style="line-height:1.6">${msg}</p>
  <div class="actions"><button class="btn" onclick="window.__cf(false)">Cancelar</button>
  <button class="btn btn-primary" onclick="window.__cf(true)">${okLabel||'Confirmar'}</button></div>`,'narrow');
  window.__cf = v=>{ fechaModal(); res(v); }; }); }
const cand = id=> state.candidatos.find(c=>c.id===id);
const avalsDe = (id,fase)=> state.avals.filter(a=>a.candidato_id===id && (!fase||a.fase===fase));
const agendDe = (id,fase)=> state.agends.find(a=>a.candidato_id===id && a.fase===fase);
function mediaAvals(l){ const ns=l.map(a=>Number(a.nota)).filter(n=>!isNaN(n)&&n>0);
  return ns.length ? (ns.reduce((s,n)=>s+n,0)/ns.length) : null; }

/* ---------------- autenticação ---------------- */
function init(){
  document.querySelectorAll('.logo-slot').forEach(el=> el.outerHTML = LOGO);
  $('#login-btn').innerHTML = ic('arrow');
  $('#btn-sair').innerHTML = ic('logout');
  db = supabase.createClient(CONFIG.url, CONFIG.anonKey);
  db.auth.getSession().then(({data:{session}})=>{ if(session) entrar(); });
  db.auth.onAuthStateChange(ev=>{ if(ev==='SIGNED_IN') entrar(); });
  $('#login-pass').addEventListener('keydown', e=>{ if(e.key==='Enter') fazerLogin(); });
}
async function fazerLogin(){
  const email=$('#login-email').value.trim(), pass=$('#login-pass').value;
  if(!email||!pass) return;
  $('#login-btn').disabled=true; $('#login-err').hidden=true;
  const {error} = await db.auth.signInWithPassword({email, password:pass});
  $('#login-btn').disabled=false;
  if(error){ $('#login-err').textContent='E-mail ou senha incorretos. Verifique os dados ou fale com o Depto de Pessoal.'; $('#login-err').hidden=false; }
}
async function sair(){ await db.auth.signOut(); location.reload(); }

const NAV = [
  ['dashboard','Visão geral','activity'],
  ['candidatos','Candidatos','users'],
  ['avaliacao','Avaliação guiada','star'],
  ['agenda','Agenda','cal'],
  ['publicacoes','Publicações','doc'],
  ['config','Configurações','gear']
];
async function entrar(){
  if(booted) return; booted=true;
  try{
    const {data:{user}} = await db.auth.getUser();
    const {data:perfil, error} = await db.from('perfis').select('*').eq('id', user.id).single();
    if(error||!perfil) throw (error||new Error('perfil não encontrado'));
    state.perfil = perfil;
    const {data:okCom} = await db.rpc('eh_comite');
    state.comiteOk = okCom === true;
    $('#user-nome').textContent = perfil.nome || perfil.email;
    $('#user-avatar').textContent = iniciais(perfil.nome || perfil.email);
    $('#user-papel').textContent = state.comiteOk ? 'Comitê de seleção' : 'Sem acesso ao módulo';
    $('#login-view').hidden = true; $('#app').hidden = false;
    if(!state.comiteOk){
      $('#nav').innerHTML='';
      $('#content').innerHTML = `<div class="card"><h3>Acesso restrito</h3>
        <p class="small muted" style="line-height:1.7">Este módulo é exclusivo do <b>comitê de seleção</b>.
        Peça a um administrador ou ao Depto de Pessoal para incluir seu registro no comitê
        (Configurações → Comitê, ou tabela <code>ps_comite</code>).</p></div>`;
      $('#page-title').textContent='Seleção';
      return;
    }
    $('#nav').innerHTML = NAV.map(([v,l,i])=>
      `<button data-view="${v}" onclick="showView('${v}')">${ic(i)}<span class="lb">${l}</span></button>`).join('');
    await carregarEdicoes();
    if(!state.ed){
      $('#content').innerHTML = `<div class="card"><h3>Nenhuma edição encontrada</h3>
        <p class="small muted">Rode a migração <b>soma_v6.sql</b> no Supabase (ela cria o Processo Seletivo 2026)
        ou crie uma edição em Configurações.</p></div>`;
      return;
    }
    await carregarTudo();
    showView('dashboard');
  }catch(e){ booted=false; falha(e,'Não foi possível carregar o módulo'); }
}
async function carregarEdicoes(){
  const {data, error} = await db.from('ps_edicoes').select('*').order('criado_em',{ascending:false});
  if(error) throw error;
  state.edicoes = data||[];
  if(!state.ed && state.edicoes.length) state.ed = state.edicoes[0];
}
async function carregarTudo(){
  const id = state.ed.id;
  const [c,e,s,a,p,v,k,m] = await Promise.all([
    db.from('ps_candidatos').select('*').eq('edicao_id', id).order('numero'),
    db.from('ps_etapas').select('*').eq('edicao_id', id).order('ordem'),
    db.from('ps_slots').select('*').eq('edicao_id', id).order('data').order('hora_inicio'),
    db.from('ps_agendamentos').select('*, slot:ps_slots!inner(*)').eq('slot.edicao_id', id),
    db.from('ps_publicacoes').select('*').eq('edicao_id', id).order('criado_em',{ascending:false}),
    db.from('ps_avaliacoes').select('*, ps_candidatos!inner(edicao_id)').eq('ps_candidatos.edicao_id', id),
    db.from('ps_comite').select('*').eq('edicao_id', id),
    db.from('membros').select('registro,nome,departamento,cargo,status').order('registro')
  ]);
  for(const r of [c,e,s,a,p,v,k,m]) if(r.error) throw r.error;
  state.candidatos = c.data||[]; state.etapas = e.data||[]; state.slots = s.data||[];
  state.agends = a.data||[]; state.pubs = p.data||[];
  state.avals = (v.data||[]).map(x=>{ delete x.ps_candidatos; return x; });
  state.comite = k.data||[]; state.membros = m.data||[];
  state.sel = new Set();
}
window.trocarEdicao = async function(id){
  state.ed = state.edicoes.find(x=>x.id===id) || state.ed;
  await carregarTudo(); showView(state.view);
};

VIEWS.dashboard = function(){
  const cs = state.candidatos;
  const n = st=> cs.filter(c=>c.status===st).length;
  const nIn = sts=> cs.filter(c=>sts.includes(c.status)).length;
  const total = cs.length;
  const funil = [
    ['Inscritos', total],
    ['Deferidos', nIn(PUB_STATUS_SETS.deferimento)],
    ['Aprovados na 1ª etapa', nIn(PUB_STATUS_SETS.resultado_dinamica)],
    ['Aprovados na 2ª etapa', nIn(PUB_STATUS_SETS.resultado_entrevista)],
    ['Aprovados no final', nIn(PUB_STATUS_SETS.resultado_final)],
    ['Integrados', n('integrado')]
  ];
  const max = Math.max(1, total);
  const h = hoje();
  const etapaAgora = state.etapas.find(e=> h>=e.data_inicio && h<=(e.data_fim||e.data_inicio));
  const proxEtapa = state.etapas.find(e=> e.data_inicio > h);
  const semDin = cs.filter(c=>c.status==='deferido' && !agendDe(c.id,'dinamica')).length;
  const semEnt = cs.filter(c=>c.status==='aprovado_dinamica' && !agendDe(c.id,'entrevista')).length;
  const rascunhos = state.pubs.filter(p=>!p.publicado).length;
  const proxSlots = state.slots.filter(s=>s.ativo && s.data>=h).slice(0,6);
  const ocup = s=> state.agends.filter(a=>a.slot_id===s.id).length;

  $('#content').innerHTML = `
  ${etapaAgora ? `<div class="banner lima"><b>Agora no cronograma:</b> ${esc(etapaAgora.titulo)}
      (${fmtD(etapaAgora.data_inicio)}${etapaAgora.data_fim&&etapaAgora.data_fim!==etapaAgora.data_inicio?' a '+fmtD(etapaAgora.data_fim):''}).</div>`
    : proxEtapa ? `<div class="banner neutral"><b>Próximo marco:</b> ${esc(proxEtapa.titulo)} em ${fmtD(proxEtapa.data_inicio)}.</div>` : ''}
  <div class="grid-cards">
    <div class="stat destaque"><div class="n">${total}</div><div class="l">Inscrições recebidas</div></div>
    <div class="stat"><div class="n">${n('inscrito')}</div><div class="l">Aguardando análise</div></div>
    <div class="stat"><div class="n">${n('deferido')}</div><div class="l">Deferidos (fase dinâmica)</div></div>
    <div class="stat"><div class="n">${n('aprovado_dinamica')}</div><div class="l">Na fase de entrevistas</div></div>
    <div class="stat"><div class="n">${n('trainee')+n('aprovado_entrevista')}</div><div class="l">Trainees</div></div>
    <div class="stat"><div class="n">${n('aprovado_final')+n('integrado')}</div><div class="l">Aprovados no final</div></div>
  </div>
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:16px">
    <div class="card"><h3>Funil do processo</h3>
      ${funil.map(([l,v])=>`<div class="bar-row"><span class="lb">${l}</span>
        <span class="tr"><span class="fl" style="width:${Math.round(v/max*100)}%"></span></span>
        <span class="vl">${v}</span></div>`).join('')}
    </div>
    <div class="card"><h3>Pendências</h3>
      ${[[n('inscrito'),'inscrições aguardando deferimento','candidatos'],
         [semDin,'deferidos ainda sem dinâmica agendada','agenda'],
         [semEnt,'aprovados sem entrevista agendada','agenda'],
         [rascunhos,'publicações em rascunho','publicacoes']]
        .filter(([q])=>q>0)
        .map(([q,t,v])=>`<div class="bar-row"><span style="flex:1">${q} ${t}</span>
          <button class="btn sm" onclick="showView('${v}')">Ver</button></div>`).join('')
        || '<div class="empty" style="padding:18px">Nenhuma pendência. Tudo em dia! ✅</div>'}
    </div>
    <div class="card"><h3>Próximos horários</h3>
      ${proxSlots.length ? proxSlots.map(s=>`<div class="bar-row">
          <span style="flex:1"><b>${fmtD(s.data)}</b> · ${hm(s.hora_inicio)}–${hm(s.hora_fim)}
            <span class="muted">(${s.fase==='dinamica'?'dinâmica':'entrevista'}${s.local?' · '+esc(s.local):''})</span></span>
          <span class="vl">${ocup(s)}/${s.capacidade}</span></div>`).join('')
        : '<div class="empty" style="padding:18px">Nenhum horário futuro aberto.<br>Abra janelas na aba Agenda.</div>'}
    </div>
  </div>
  <div class="card"><h3>Site público</h3>
    <p class="small muted" style="line-height:1.7">Inscrições, acompanhamento e agendamento dos candidatos acontecem em
    <a href="${SITE_PS}" target="_blank" rel="noopener">${SITE_PS.replace('https://','')}</a>.
    Os candidatos só enxergam cada resultado depois que a publicação correspondente for <b>publicada</b> na aba Publicações.</p></div>`;
};

VIEWS.candidatos = function(){
  const f = state.filtros;
  let lista = state.candidatos;
  if(f.status) lista = lista.filter(c=>c.status===f.status);
  if(f.q){ const q=f.q.toLowerCase();
    lista = lista.filter(c=>(c.nome+' '+c.email+' '+(c.protocolo||'')+' '+(c.curso||'')).toLowerCase().includes(q)); }

  $('#content').innerHTML = `
  <div class="filters">
    <div class="field grow"><label>Buscar</label>
      <input value="${esc(f.q)}" placeholder="Nome, e-mail, protocolo ou curso…"
        oninput="state.filtros.q=this.value; filtraCand()"></div>
    <div class="field"><label>Status</label>
      <select onchange="state.filtros.status=this.value; filtraCand()">
        <option value="">Todos</option>
        ${Object.keys(ST).map(s=>`<option value="${s}" ${f.status===s?'selected':''}>${ST[s][0]}</option>`).join('')}
      </select></div>
    <button class="btn" onclick="exportarCSV()">${ic('doc')} Exportar CSV</button>
  </div>
  <div class="card" style="padding:8px 12px">
    <table class="tb"><thead><tr>
      <th style="width:34px"><input type="checkbox" onchange="selTodos(this.checked)" ${lista.length&&lista.every(c=>state.sel.has(c.id))?'checked':''}></th>
      <th>Protocolo</th><th>Nome</th><th>Curso / período</th><th>Status</th><th>Dinâmica</th><th>Entrevista</th><th>Média</th>
    </tr></thead>
    <tbody id="cand-body">${lista.map(linhasCand).join('') ||
      `<tr><td colspan="8"><div class="empty">Nenhum candidato ${state.candidatos.length?'com esses filtros':'inscrito ainda'}.</div></td></tr>`}</tbody>
    </table>
  </div>
  <div id="sel-bar-slot"></div>`;
  renderSelBar();
};
function linhasCand(c){
  const ad = agendDe(c.id,'dinamica'), ae = agendDe(c.id,'entrevista');
  const md = mediaAvals(avalsDe(c.id));
  const agTxt = a=> a&&a.slot ? `${fmtD(a.slot.data)} ${hm(a.slot.hora_inicio)}` : '<span class="muted">—</span>';
  return `<tr class="click" onclick="abrirFicha('${c.id}')">
    <td onclick="event.stopPropagation()"><input type="checkbox" ${state.sel.has(c.id)?'checked':''} onchange="selUm('${c.id}',this.checked)"></td>
    <td class="reg">${esc(c.protocolo||'—')}</td>
    <td><b>${esc(c.nome)}</b><br><span class="small muted">${esc(c.email)}</span></td>
    <td class="small">${esc(c.curso||'—')}${c.periodo?` · ${esc(c.periodo)}`:''}</td>
    <td>${pill(c.status)}</td>
    <td class="small">${agTxt(ad)}</td>
    <td class="small">${agTxt(ae)}</td>
    <td>${md!=null?`<span class="nota-badge">★ ${md.toFixed(1)}</span>`:'<span class="muted small">—</span>'}</td>
  </tr>`;
}
window.filtraCand = (function(){ let t; return function(){ clearTimeout(t); t=setTimeout(()=>VIEWS.candidatos(),200); }; })();
window.selTodos = function(on){
  const f=state.filtros; let lista = state.candidatos;
  if(f.status) lista = lista.filter(c=>c.status===f.status);
  if(f.q){ const q=f.q.toLowerCase(); lista=lista.filter(c=>(c.nome+' '+c.email+' '+(c.protocolo||'')).toLowerCase().includes(q)); }
  lista.forEach(c=> on?state.sel.add(c.id):state.sel.delete(c.id));
  VIEWS.candidatos();
};
window.selUm = function(id,on){ on?state.sel.add(id):state.sel.delete(id); renderSelBar(); };
function renderSelBar(){
  const slot = $('#sel-bar-slot'); if(!slot) return;
  if(!state.sel.size){ slot.innerHTML=''; return; }
  slot.innerHTML = `<div class="sel-bar">
    <span class="qt">${state.sel.size} selecionado${state.sel.size>1?'s':''}</span>
    <select id="mov-sel">${MOVS.map(([v,l])=>`<option value="${v}">${l}</option>`).join('')}</select>
    <button class="btn" onclick="moverLote()">Aplicar</button>
    <button class="linkzim" onclick="state.sel.clear(); VIEWS.candidatos()">limpar seleção</button>
  </div>`;
}
window.moverLote = async function(){
  const alvo = $('#mov-sel').value;
  const [,lbl] = MOVS.find(m=>m[0]===alvo);
  const ids = [...state.sel];
  if(!await confirma(`Aplicar "<b>${lbl}</b>" a <b>${ids.length}</b> candidato(s)?<br>
    <span class="small muted">O candidato só vê o novo resultado quando a publicação da etapa for publicada.</span>`)) return;
  try{
    const {error} = await db.from('ps_candidatos').update({status:alvo}).in('id', ids);
    if(error) throw error;
    toast('Movimentação aplicada.');
    await carregarTudo(); VIEWS.candidatos();
  }catch(e){ falha(e,'Falha na movimentação'); }
};
window.exportarCSV = function(){
  const cols = ['protocolo','status','nome','email','telefone','curso','instituicao','periodo',
    'areas_interesse','disponibilidade','como_soube','criado_em'];
  const linhas = [cols.join(';')].concat(state.candidatos.map(c=>
    cols.map(k=>{ let v=c[k]; if(Array.isArray(v)) v=v.join(', ');
      return '"'+String(v??'').replace(/"/g,'""')+'"'; }).join(';')));
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['﻿'+linhas.join('\n')],{type:'text/csv;charset=utf-8'}));
  a.download='candidatos-'+(state.ed.slug||'ps')+'.csv'; a.click(); URL.revokeObjectURL(a.href);
};

           ['Acessibilidade',c.acessibilidade],['Instituição',c.instituicao],['Curso',c.curso],
           ['Matrícula',c.matricula],['Período',c.periodo],['Disponibilidade',c.disponibilidade],

      ${c.motivacao?`<div style="margin-top:14px"><dt style="font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:600">Motivação</dt>

window.fichaTab = function(btn, tab){
  btn.parentElement.querySelectorAll('button').forEach(b=>b.classList.toggle('active', b===btn));
  ['dados','avals','acoes'].forEach(t=> document.getElementById('ftab-'+t).hidden = t!==tab);
};
window.moverUm = async function(id){
  const alvo = $('#mv-um').value;
  try{
    const {error} = await db.from('ps_candidatos').update({status:alvo}).eq('id', id);
    if(error) throw error;
    toast('Status atualizado.'); fechaModal();
    await carregarTudo(); showView(state.view);
  }catch(e){ falha(e,'Falha ao mover'); }
};
window.integrar = async function(id){
  const reg = parseInt($('#int-reg').value,10);
  if(!reg){ toast('Informe o nº de registro.', true); return; }
  const c = cand(id);
  if(!await confirma(`Integrar <b>${esc(c.nome)}</b> como membro com o registro <b>${reg}</b>?`)) return;
  try{
    const {data, error} = await db.rpc('ps_integrar', {p_candidato:id, p_registro:reg,
      p_departamento: $('#int-dep').value||null, p_cargo: $('#int-cargo').value||null});
    if(error) throw error;
    if(data.status==='ok'){ toast(`Membro criado com o registro ${reg}. 🎉`); fechaModal();
      await carregarTudo(); showView(state.view); }
    else if(data.status==='registro_em_uso') toast('Este registro já está em uso.', true);
    else if(data.status==='status_invalido') toast('O candidato precisa estar como trainee ou aprovado no final.', true);
    else toast('Não foi possível integrar: '+(data.status||''), true);
  }catch(e){ falha(e,'Falha na integração'); }
};

   AVALIAÇÃO GUIADA
   ============================================================ */
VIEWS.avaliacao = function(){
  const fase = state.faseAval, cf = FASES_AVAL[fase];
  const uid = state.perfil.id;
  const eleg = state.candidatos.filter(c=>cf.el.includes(c.status));
  const rank = eleg.map(c=>({c, avs:avalsDe(c.id,fase)}))
    .map(x=>({...x, media:mediaAvals(x.avs)}))
    .sort((a,b)=> (b.media??-1)-(a.media??-1));

  $('#content').innerHTML = `
  <div class="banner neutral">O SOMA guia a avaliação por fase: selecione a fase, avalie cada candidato pelos critérios padronizados e acompanhe o consolidado. Cada membro do comitê registra a própria avaliação — a nota final é a média.</div>
  <div class="fase-chips">${Object.keys(FASES_AVAL).map(f=>
    `<button class="${f===fase?'on':''}" onclick="state.faseAval='${f}';VIEWS.avaliacao()">${FASES_AVAL[f].lbl}</button>`).join('')}</div>
  <div class="card">
    <h3>${cf.lbl} — ${eleg.length} candidato${eleg.length===1?'':'s'} nesta fase</h3>
    ${eleg.length ? rank.map(({c,avs,media})=>{
      const minha = avs.find(a=>a.avaliador_id===uid);
      const ag = (fase==='dinamica'||fase==='entrevista') ? agendDe(c.id,fase) : null;
      const recs = avs.reduce((m,a)=>{ if(a.recomendacao) m[a.recomendacao]=(m[a.recomendacao]||0)+1; return m; },{});
      return `<div class="aval-cand">
        <div style="min-width:0;flex:1">
          <div class="nm">${esc(c.nome)} <span class="reg">${esc(c.protocolo||'')}</span></div>
          <div class="mt">${pill(c.status)}
            ${ag&&ag.slot?` · 📅 ${fmtD(ag.slot.data)} ${hm(ag.slot.hora_inicio)}`:''}
            ${avs.length?` · ${avs.length} avaliação${avs.length>1?'ões':''}`:' · sem avaliações'}
            ${Object.keys(recs).length?' · '+Object.entries(recs).map(([r,q])=>`${q}× ${REC_LBL[r]}`).join(', '):''}
          </div>
        </div>
        ${media!=null?`<span class="nota-badge">★ ${media.toFixed(1)}</span>`:''}
        <button class="btn ${minha?'':'btn-primary'} sm" onclick="abrirAvaliacao('${c.id}','${fase}')">
          ${minha?ic('pencil')+' Editar minha avaliação':ic('star')+' Avaliar'}</button>
      </div>`; }).join('')
    : `<div class="empty">Nenhum candidato nesta fase no momento.<br>
       <span class="small">Os candidatos entram aqui conforme as movimentações na aba Candidatos.</span></div>`}
  </div>`;
};
window.abrirAvaliacao = function(candId, fase){
  const c = cand(candId), cf = FASES_AVAL[fase];
  const minha = avalsDe(candId,fase).find(a=>a.avaliador_id===state.perfil.id);
  const crit = minha?.criterios || {};
  window.__aval = {candId, fase, criterios:{...crit}, recomendacao:minha?.recomendacao||null};
  abreModal(`
    <h3>${cf.lbl} — ${esc(c.nome)}</h3>
    <p class="small muted" style="margin:-8px 0 14px">Dê uma nota de 1 a 5 em cada critério. A nota geral é a média dos critérios preenchidos.</p>
    ${cf.crit.map((cr,i)=>`<div class="crit-row"><span class="lb">${cr}</span>
      <span class="seg15" data-cr="${esc(cr)}">${[1,2,3,4,5].map(n=>
        `<button class="${crit[cr]===n?'on':''}" onclick="notaCr(this,'${esc(cr)}',${n})">${n}</button>`).join('')}</span></div>`).join('')}
    <div class="field" style="margin-top:14px"><label>Parecer</label>
      <textarea id="av-parecer" placeholder="Observações, destaques, pontos de atenção…">${esc(minha?.parecer||'')}</textarea></div>
    <div class="field"><label>Recomendação</label>
      <div class="rec-seg">
        <button id="rec-aprovar" class="${window.__aval.recomendacao==='aprovar'?'on-ap':''}" onclick="recSel('aprovar')">✓ Aprovar</button>
        <button id="rec-em_duvida" class="${window.__aval.recomendacao==='em_duvida'?'on-du':''}" onclick="recSel('em_duvida')">? Em dúvida</button>
        <button id="rec-reprovar" class="${window.__aval.recomendacao==='reprovar'?'on-re':''}" onclick="recSel('reprovar')">✕ Reprovar</button>
      </div></div>
    <div class="actions">
      <button class="btn" onclick="fechaModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="salvarAvaliacao()">${ic('check')} Salvar avaliação</button>
    </div>`);
};
window.notaCr = function(btn, cr, n){
  window.__aval.criterios[cr] = n;
  btn.parentElement.querySelectorAll('button').forEach(b=>b.classList.toggle('on', b===btn));
};
window.recSel = function(r){
  window.__aval.recomendacao = r;
  const map = {aprovar:'on-ap', em_duvida:'on-du', reprovar:'on-re'};
  Object.keys(map).forEach(k=>{ const b=document.getElementById('rec-'+k);
    b.className = k===r ? map[k] : ''; });
};
window.salvarAvaliacao = async function(){
  const {candId, fase, criterios, recomendacao} = window.__aval;
  const notas = Object.values(criterios).filter(n=>n>0);
  if(!notas.length){ toast('Preencha ao menos um critério.', true); return; }
  const nota = Math.round(notas.reduce((s,n)=>s+n,0)/notas.length*100)/100;
  try{
    const {error} = await db.from('ps_avaliacoes').upsert({
      candidato_id:candId, fase, criterios, nota,
      parecer: $('#av-parecer').value.trim()||null,
      recomendacao, avaliador_id: state.perfil.id, avaliador: quemSouEu()
    }, {onConflict:'candidato_id,fase,avaliador_id'});
    if(error) throw error;
    toast('Avaliação salva.'); fechaModal();
    await carregarTudo(); VIEWS.avaliacao();
  }catch(e){ falha(e,'Falha ao salvar avaliação'); }
};

/* ============================================================
   AGENDA (slots das dinâmicas e entrevistas)
   ============================================================ */
VIEWS.agenda = function(){
  const fase = state.faseAgenda;
  const slots = state.slots.filter(s=>s.fase===fase);
  const porDia = {};
  slots.forEach(s=>{ (porDia[s.data]=porDia[s.data]||[]).push(s); });
  const ocup = s=> state.agends.filter(a=>a.slot_id===s.id).length;

  $('#content').innerHTML = `
  <div class="tabs">
    <button class="${fase==='dinamica'?'active':''}" onclick="state.faseAgenda='dinamica';VIEWS.agenda()">Dinâmicas em grupo</button>
    <button class="${fase==='entrevista'?'active':''}" onclick="state.faseAgenda='entrevista';VIEWS.agenda()">Entrevistas individuais</button>
  </div>
  <div class="card">
    <h3>Abrir janela de horários</h3>
    <p class="small muted" style="margin:-8px 0 12px">Gera vários horários de uma vez — como no Calendly. O candidato escolhe um deles no site.</p>
    <div class="form-grid">
      <div class="field"><label>Data</label><input id="sl-data" type="date"></div>
      <div class="field"><label>Início</label><input id="sl-ini" type="time" value="${fase==='dinamica'?'18:00':'14:00'}"></div>
      <div class="field"><label>Fim</label><input id="sl-fim" type="time" value="${fase==='dinamica'?'21:00':'18:00'}"></div>
      <div class="field"><label>Duração (min)</label><input id="sl-dur" type="number" value="${fase==='dinamica'?'90':'30'}"></div>
      <div class="field"><label>Vagas por horário</label><input id="sl-cap" type="number" value="${fase==='dinamica'?'8':'1'}"></div>
      <div class="field"><label>Local</label><input id="sl-local" placeholder="Ex.: LABBIO — Sala de reunião"></div>
    </div>
    <button class="btn btn-primary" onclick="criarSlots('${fase}')">${ic('plus')} Criar horários</button>
  </div>
  <div class="card">
    <h3>Horários abertos${slots.length?` — ${slots.length}`:''}</h3>
    ${Object.keys(porDia).sort().map(d=>`
      <div class="slot-dia"><h4>${new Date(d+'T12:00:00').toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'2-digit'})}</h4>
      <div class="slot-chips">${porDia[d].map(s=>{
        const o = ocup(s);
        return `<button class="slot-chip ${o>=s.capacidade?'cheio':''} ${s.ativo?'':'inativo'}" onclick="abrirSlot('${s.id}')">
          <div class="h">${hm(s.hora_inicio)}–${hm(s.hora_fim)}</div>
          <div class="o">${o}/${s.capacidade} vaga${s.capacidade>1?'s':''}${s.local?' · '+esc(s.local):''}${s.ativo?'':' · inativo'}</div>
        </button>`; }).join('')}</div></div>`).join('')
      || `<div class="empty">Nenhum horário de ${fase==='dinamica'?'dinâmica':'entrevista'} aberto ainda.</div>`}
  </div>`;
};
window.criarSlots = async function(fase){
  const data=$('#sl-data').value, ini=$('#sl-ini').value, fim=$('#sl-fim').value;
  const dur=parseInt($('#sl-dur').value,10), cap=parseInt($('#sl-cap').value,10), local=$('#sl-local').value.trim();
  if(!data||!ini||!fim||!dur||!cap){ toast('Preencha data, horários, duração e vagas.', true); return; }
  const linhas=[]; let t = new Date(`${data}T${ini}:00`); const tf = new Date(`${data}T${fim}:00`);
  while(t < tf){
    const prox = new Date(t.getTime()+dur*60000);
    if(prox > tf) break;
    const h = x=> x.toTimeString().slice(0,5);
    linhas.push({edicao_id:state.ed.id, fase, data, hora_inicio:h(t), hora_fim:h(prox), capacidade:cap, local:local||null});
    t = prox;
  }
  if(!linhas.length){ toast('Nenhum horário cabe nessa janela.', true); return; }
  try{
    const {error} = await db.from('ps_slots').insert(linhas);
    if(error) throw error;
    toast(`${linhas.length} horário(s) criado(s).`);
    await carregarTudo(); VIEWS.agenda();
  }catch(e){ falha(e,'Falha ao criar horários'); }
};
window.abrirSlot = function(id){
  const s = state.slots.find(x=>x.id===id); if(!s) return;
  const ags = state.agends.filter(a=>a.slot_id===id);
  abreModal(`
    <h3>${s.fase==='dinamica'?'Dinâmica':'Entrevista'} — ${fmtD(s.data)} · ${hm(s.hora_inicio)}–${hm(s.hora_fim)}</h3>
    <p class="small muted" style="margin:-8px 0 12px">${s.local?esc(s.local)+' · ':''}${ags.length}/${s.capacidade} vaga${s.capacidade>1?'s':''} ocupada${ags.length===1?'':'s'}</p>
    ${ags.length ? `<table class="tb"><thead><tr><th>Candidato</th><th>Contato</th><th>Presença</th></tr></thead><tbody>
      ${ags.map(a=>{ const c=cand(a.candidato_id);
        return `<tr><td><b>${esc(c?.nome||'—')}</b><br><span class="reg">${esc(c?.protocolo||'')}</span></td>
          <td class="small">${esc(c?.telefone||'')}<br>${esc(c?.email||'')}</td>
          <td><span class="seg15">
            <button class="${a.compareceu===true?'on':''}" style="width:56px" onclick="presenca('${a.id}',true)">Sim</button>
            <button class="${a.compareceu===false?'on':''}" style="width:56px" onclick="presenca('${a.id}',false)">Não</button>
          </span></td></tr>`; }).join('')}</tbody></table>`
    : '<div class="empty">Nenhum candidato agendado neste horário.</div>'}
    <div class="actions">
      <button class="btn ${s.ativo?'':'btn-primary'}" onclick="toggleSlot('${s.id}',${!s.ativo})">${s.ativo?'Desativar horário':'Reativar horário'}</button>
      <button class="btn btn-danger" onclick="excluirSlot('${s.id}',${ags.length})">${ic('trash')} Excluir</button>
      <button class="btn btn-primary" onclick="fechaModal()">Fechar</button>
    </div>`);
};
window.presenca = async function(agId, v){
  try{
    const {error} = await db.from('ps_agendamentos').update({compareceu:v}).eq('id', agId);
    if(error) throw error;
    const a = state.agends.find(x=>x.id===agId); if(a){ a.compareceu=v; abrirSlot(a.slot_id); }
    toast('Presença registrada.');
  }catch(e){ falha(e,'Falha ao registrar presença'); }
};
window.toggleSlot = async function(id, ativo){
  try{
    const {error} = await db.from('ps_slots').update({ativo}).eq('id', id);
    if(error) throw error;
    toast(ativo?'Horário reativado.':'Horário desativado — some do site.');
    fechaModal(); await carregarTudo(); VIEWS.agenda();
  }catch(e){ falha(e,'Falha ao atualizar horário'); }
};
window.excluirSlot = async function(id, qtd){
  if(!await confirma(qtd?`Este horário tem <b>${qtd}</b> agendamento(s), que serão <b>removidos</b> junto. Excluir mesmo assim?`
    :'Excluir este horário?','Excluir')) return;
  try{
    const {error} = await db.from('ps_slots').delete().eq('id', id);
    if(error) throw error;
    toast('Horário excluído.'); fechaModal();
    await carregarTudo(); VIEWS.agenda();
  }catch(e){ falha(e,'Falha ao excluir'); }
};

/* ============================================================
   PUBLICAÇÕES
   ============================================================ */
VIEWS.publicacoes = function(){
  $('#content').innerHTML = `
  <div class="banner neutral">O site público só mostra o que estiver <b>publicado</b> — e é a publicação de cada resultado que libera a situação correspondente para os candidatos. As listas de aprovados são geradas automaticamente a partir do status atual.</div>
  <div style="margin-bottom:14px"><button class="btn btn-primary" onclick="editarPub()">${ic('plus')} Nova publicação</button></div>
  ${state.pubs.map(p=>{
    const setPub = PUB_STATUS_SETS[p.tipo];
    const qtd = setPub ? state.candidatos.filter(c=>setPub.includes(c.status)).length : null;
    return `<div class="pub-row">
      <div style="min-width:0;flex:1">
        <div class="tt">${esc(p.titulo)} <span class="chip">${TIPO_PUB[p.tipo]||p.tipo}</span></div>
        <div class="mt">${p.publicado?`Publicado em ${fmtDT(p.publicado_em)}`:`Rascunho · criado em ${fmtDT(p.criado_em)}`}
          ${qtd!=null?` · lista atual: <b>${qtd}</b> nome${qtd===1?'':'s'}`:''}</div>
      </div>
      <span class="badge-pub ${p.publicado?'sim':'nao'}">${p.publicado?'No ar':'Rascunho'}</span>
      <button class="icon-btn sm" title="Editar" onclick="editarPub('${p.id}')">${ic('pencil')}</button>
      <button class="btn sm ${p.publicado?'':'btn-primary'}" onclick="publicarPub('${p.id}',${!p.publicado})">
        ${p.publicado?'Despublicar':'Publicar'}</button>
      <button class="icon-btn sm" title="Excluir" onclick="excluirPub('${p.id}')">${ic('trash')}</button>
    </div>`; }).join('') || '<div class="empty">Nenhuma publicação criada.<br>Comece pelo <b>edital</b>.</div>'}`;
};
window.editarPub = function(id){
  const p = id ? state.pubs.find(x=>x.id===id) : null;
  abreModal(`
    <h3>${p?'Editar publicação':'Nova publicação'}</h3>
    <div class="field"><label>Tipo</label>
      <select id="pb-tipo">${Object.entries(TIPO_PUB).map(([v,l])=>
        `<option value="${v}" ${p?.tipo===v?'selected':''}>${l}</option>`).join('')}</select></div>
    <div class="field"><label>Título</label><input id="pb-titulo" value="${esc(p?.titulo||'')}" placeholder="Ex.: Edital nº 01/2026 — Processo Seletivo"></div>
    <div class="field"><label>Texto</label><textarea id="pb-corpo" style="min-height:130px" placeholder="Texto exibido no site (opcional para resultados — a lista é automática).">${esc(p?.corpo||'')}</textarea></div>
    <div class="field"><label>Link do documento (PDF do edital etc.)</label><input id="pb-anexo" value="${esc(p?.url_anexo||'')}" placeholder="https://…"></div>
    <p class="small muted">Para tipos de resultado, a lista de nomes é montada na hora a partir do status dos candidatos — faça as movimentações antes de publicar.</p>
    <div class="actions">
      <button class="btn" onclick="fechaModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="salvarPub(${p?`'${p.id}'`:'null'})">${ic('check')} Salvar</button>
    </div>`);
};
window.salvarPub = async function(id){
  const linha = { tipo:$('#pb-tipo').value, titulo:$('#pb-titulo').value.trim(),
    corpo:$('#pb-corpo').value.trim()||null, url_anexo:$('#pb-anexo').value.trim()||null };
  if(!linha.titulo){ toast('Dê um título à publicação.', true); return; }
  try{
    const q = id ? db.from('ps_publicacoes').update(linha).eq('id', id)
                 : db.from('ps_publicacoes').insert({...linha, edicao_id:state.ed.id, criado_por:quemSouEu()});
    const {error} = await q;
    if(error) throw error;
    toast('Publicação salva.'); fechaModal();
    await carregarTudo(); VIEWS.publicacoes();
  }catch(e){ falha(e,'Falha ao salvar publicação'); }
};
window.publicarPub = async function(id, publicar){
  const p = state.pubs.find(x=>x.id===id);
  const setPub = PUB_STATUS_SETS[p.tipo];
  const qtd = setPub ? state.candidatos.filter(c=>setPub.includes(c.status)).length : null;
  if(publicar && !await confirma(`Publicar "<b>${esc(p.titulo)}</b>"?<br><span class="small muted">
    Ela aparece imediatamente no site${qtd!=null?` com <b>${qtd}</b> nome(s) na lista, e libera essa etapa do resultado para os candidatos`:''}.</span>`,'Publicar')) return;
  try{
    const {error} = await db.from('ps_publicacoes')
      .update({publicado:publicar, publicado_em: publicar?new Date().toISOString():null}).eq('id', id);
    if(error) throw error;
    toast(publicar?'Publicado no site. 📣':'Removido do site.');
    await carregarTudo(); VIEWS.publicacoes();
  }catch(e){ falha(e,'Falha ao publicar'); }
};
window.excluirPub = async function(id){
  if(!await confirma('Excluir esta publicação?','Excluir')) return;
  try{
    const {error} = await db.from('ps_publicacoes').delete().eq('id', id);
    if(error) throw error;
    toast('Publicação excluída.');
    await carregarTudo(); VIEWS.publicacoes();
  }catch(e){ falha(e,'Falha ao excluir'); }
};

/* ============================================================
   CONFIGURAÇÕES (edição, cronograma, comitê)
   ============================================================ */
VIEWS.config = function(){
  const e = state.ed;
  const admin = ['admin','pessoal'].includes(state.perfil.papel);
  const membroDe = r=> state.membros.find(m=>m.registro===r);
  $('#content').innerHTML = `
  <div class="card">
    <h3>Edição</h3>
    <div class="form-grid">
      <div class="field full"><label>Nome</label><input id="ed-nome" value="${esc(e.nome)}"></div>
      <div class="field full"><label>Descrição (aparece no site)</label><textarea id="ed-desc">${esc(e.descricao||'')}</textarea></div>
      <div class="field"><label>Início das inscrições</label><input id="ed-ini" type="date" value="${e.inscricoes_inicio}"></div>
      <div class="field"><label>Fim das inscrições</label><input id="ed-fim" type="date" value="${e.inscricoes_fim}"></div>
      <div class="field"><label>Status</label><select id="ed-status">
        ${['rascunho','publicada','encerrada'].map(s=>`<option ${e.status===s?'selected':''}>${s}</option>`).join('')}</select></div>
      <div class="field"><label>URL do edital (PDF)</label><input id="ed-edital" value="${esc(e.edital_url||'')}" placeholder="https://…"></div>
      <div class="field full"><label>Áreas do formulário (separadas por vírgula)</label>
        <input id="ed-areas" value="${esc((e.areas||[]).join(', '))}"></div>
    </div>
    <p class="small muted" style="margin-bottom:10px">O site mostra a edição <b>publicada</b> mais recente. "Rascunho" fica invisível ao público; "encerrada" tira a edição do ar.</p>
    <button class="btn btn-primary" onclick="salvarEdicao()">${ic('check')} Salvar edição</button>
    <button class="btn" onclick="novaEdicao()" style="margin-left:8px">${ic('plus')} Nova edição</button>
  </div>

  <div class="card">
    <h3>Cronograma público</h3>
    <table class="tb"><thead><tr><th>Ordem</th><th>Marco</th><th>Período</th><th>Fase</th><th></th></tr></thead><tbody>
      ${state.etapas.map(t=>`<tr>
        <td class="reg">${t.ordem}</td><td><b>${esc(t.titulo)}</b></td>
        <td class="small">${fmtD(t.data_inicio)}${t.data_fim&&t.data_fim!==t.data_inicio?' — '+fmtD(t.data_fim):''}</td>
        <td><span class="chip">${esc(t.fase)}</span></td>
        <td style="text-align:right;white-space:nowrap">
          <button class="icon-btn sm ghost" onclick="editarEtapa('${t.id}')">${ic('pencil')}</button>
          <button class="icon-btn sm ghost" onclick="excluirEtapa('${t.id}')">${ic('trash')}</button></td>
      </tr>`).join('') || '<tr><td colspan="5"><div class="empty">Nenhum marco cadastrado.</div></td></tr>'}
    </tbody></table>
    <div style="margin-top:12px"><button class="btn" onclick="editarEtapa()">${ic('plus')} Adicionar marco</button></div>
  </div>

  <div class="card">
    <h3>Comitê de seleção</h3>
    <p class="small muted" style="margin:-8px 0 12px">Quem está aqui acessa este módulo por completo (mesmo com papel de consulta no SOMA). Administração e Depto de Pessoal sempre têm acesso.${admin?'':' <b>Só admin/pessoal alteram a composição.</b>'}</p>
    ${state.comite.map(k=>{ const m = membroDe(k.registro);
      return `<div class="bar-row"><span class="avatar" style="width:28px;height:28px">${esc(iniciais(m?.nome))}</span>
        <span style="flex:1"><b>${esc(m?.nome||'registro '+k.registro)}</b>
        <span class="muted small"> · ${esc(m?.departamento||'')} ${m?.cargo?'· '+esc(m.cargo):''}</span></span>
        ${admin?`<button class="icon-btn sm ghost" onclick="tirarComite(${k.registro})">${ic('x')}</button>`:''}</div>`; }).join('')
      || '<div class="empty" style="padding:16px">Nenhum membro indicado — apenas admin/pessoal acessam por enquanto.</div>'}
    ${admin?`<div style="display:flex;gap:10px;margin-top:12px;flex-wrap:wrap">
      <select id="com-add" style="flex:1;min-width:240px;border:1px solid var(--line2);border-radius:10px;padding:8.5px 11px;background:#fff">
        <option value="">Escolher membro…</option>
        ${state.membros.filter(m=>m.status==='Ativo'&&!state.comite.some(k=>k.registro===m.registro))
          .map(m=>`<option value="${m.registro}">${m.registro} — ${esc(m.nome)}</option>`).join('')}
      </select>
      <button class="btn btn-primary" onclick="addComite()">${ic('plus')} Incluir no comitê</button></div>`:''}
  </div>`;
};
window.salvarEdicao = async function(){
  const linha = { nome:$('#ed-nome').value.trim(), descricao:$('#ed-desc').value.trim()||null,
    inscricoes_inicio:$('#ed-ini').value, inscricoes_fim:$('#ed-fim').value,
    status:$('#ed-status').value, edital_url:$('#ed-edital').value.trim()||null,
    areas: $('#ed-areas').value.split(',').map(s=>s.trim()).filter(Boolean) };
  if(!linha.nome||!linha.inscricoes_inicio||!linha.inscricoes_fim){ toast('Preencha nome e período de inscrições.', true); return; }
  try{
    const {error} = await db.from('ps_edicoes').update(linha).eq('id', state.ed.id);
    if(error) throw error;
    toast('Edição salva.');
    await carregarEdicoes(); state.ed = state.edicoes.find(x=>x.id===state.ed.id);
    VIEWS.config();
  }catch(e){ falha(e,'Falha ao salvar edição'); }
};
window.novaEdicao = async function(){
  abreModal(`<h3>Nova edição</h3>
    <div class="field"><label>Nome</label><input id="ne-nome" placeholder="Processo Seletivo 2027"></div>
    <div class="field"><label>Identificador (slug)</label><input id="ne-slug" placeholder="ps-2027"></div>
    <div class="form-grid">
      <div class="field"><label>Início das inscrições</label><input id="ne-ini" type="date"></div>
      <div class="field"><label>Fim das inscrições</label><input id="ne-fim" type="date"></div>
    </div>
    <p class="small muted">A edição nasce como <b>rascunho</b> — publique-a nas configurações quando estiver pronta.</p>
    <div class="actions"><button class="btn" onclick="fechaModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="criarEdicao()">${ic('check')} Criar</button></div>`,'narrow');
};
window.criarEdicao = async function(){
  const nome=$('#ne-nome').value.trim(), slug=$('#ne-slug').value.trim().toLowerCase();
  const ini=$('#ne-ini').value, fim=$('#ne-fim').value;
  if(!nome||!slug||!ini||!fim){ toast('Preencha todos os campos.', true); return; }
  try{
    const {data, error} = await db.from('ps_edicoes')
      .insert({nome, slug, inscricoes_inicio:ini, inscricoes_fim:fim, areas:state.ed?.areas||[]})
      .select().single();
    if(error) throw error;
    toast('Edição criada.'); fechaModal();
    await carregarEdicoes(); state.ed = state.edicoes.find(x=>x.id===data.id);
    await carregarTudo(); showView('config');
  }catch(e){ falha(e,'Falha ao criar edição'); }
};
window.editarEtapa = function(id){
  const t = id ? state.etapas.find(x=>x.id===id) : null;
  abreModal(`<h3>${t?'Editar marco':'Novo marco do cronograma'}</h3>
    <div class="field"><label>Título</label><input id="et-titulo" value="${esc(t?.titulo||'')}"></div>
    <div class="form-grid">
      <div class="field"><label>Data de início</label><input id="et-ini" type="date" value="${t?.data_inicio||''}"></div>
      <div class="field"><label>Data de fim (opcional)</label><input id="et-fim" type="date" value="${t?.data_fim||''}"></div>
      <div class="field"><label>Fase</label><select id="et-fase">
        ${FASES_ETAPA.map(f=>`<option ${t?.fase===f?'selected':''}>${f}</option>`).join('')}</select></div>
      <div class="field"><label>Ordem</label><input id="et-ordem" type="number" value="${t?.ordem??(Math.max(0,...state.etapas.map(x=>x.ordem))+10)}"></div>
    </div>
    <div class="field"><label>Descrição (opcional, aparece no site)</label><textarea id="et-desc">${esc(t?.descricao||'')}</textarea></div>
    <div class="actions"><button class="btn" onclick="fechaModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="salvarEtapa(${t?`'${t.id}'`:'null'})">${ic('check')} Salvar</button></div>`);
};
window.salvarEtapa = async function(id){
  const linha = { titulo:$('#et-titulo').value.trim(), data_inicio:$('#et-ini').value,
    data_fim:$('#et-fim').value||null, fase:$('#et-fase').value,
    ordem:parseInt($('#et-ordem').value,10)||100, descricao:$('#et-desc').value.trim()||null };
  if(!linha.titulo||!linha.data_inicio){ toast('Preencha título e data.', true); return; }
  try{
    const q = id ? db.from('ps_etapas').update(linha).eq('id', id)
                 : db.from('ps_etapas').insert({...linha, edicao_id:state.ed.id});
    const {error} = await q;
    if(error) throw error;
    toast('Cronograma atualizado.'); fechaModal();
    await carregarTudo(); VIEWS.config();
  }catch(e){ falha(e,'Falha ao salvar marco'); }
};
window.excluirEtapa = async function(id){
  if(!await confirma('Excluir este marco do cronograma?','Excluir')) return;
  try{
    const {error} = await db.from('ps_etapas').delete().eq('id', id);
    if(error) throw error;
    toast('Marco excluído.');
    await carregarTudo(); VIEWS.config();
  }catch(e){ falha(e,'Falha ao excluir'); }
};
window.addComite = async function(){
  const reg = parseInt($('#com-add').value,10);
  if(!reg){ toast('Escolha um membro.', true); return; }
  try{
    const {error} = await db.from('ps_comite').insert({edicao_id:state.ed.id, registro:reg});
    if(error) throw error;
    toast('Membro incluído no comitê.');
    await carregarTudo(); VIEWS.config();
  }catch(e){ falha(e,'Falha ao incluir'); }
};
window.tirarComite = async function(reg){
  if(!await confirma('Remover este membro do comitê? Ele perde o acesso ao módulo.','Remover')) return;
  try{
    const {error} = await db.from('ps_comite').delete().eq('edicao_id', state.ed.id).eq('registro', reg);
    if(error) throw error;
    toast('Removido do comitê.');
    await carregarTudo(); VIEWS.config();
  }catch(e){ falha(e,'Falha ao remover'); }
};

init();
</script>
</body>
</html>
